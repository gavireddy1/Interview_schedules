<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Interview Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#f4f3ef;color:#1a1a2e;min-height:100vh}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 5% 0%,rgba(200,148,74,.1) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 95% 100%,rgba(106,180,232,.08) 0%,transparent 55%)}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:28px 18px 80px}
input,select,textarea{width:100%;background:#fff;border:1.5px solid #e0dbd0;border-radius:9px;
  padding:10px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:#1a1a2e;
  outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#c8944a;box-shadow:0 0 0 3px rgba(200,148,74,.1)}
textarea{resize:vertical;min-height:68px}
.btn{padding:10px 20px;border:none;border-radius:9px;font-family:'Outfit',sans-serif;
  font-weight:600;font-size:13px;cursor:pointer;transition:all .18s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-amber{background:#c8944a;color:#fff}.btn-amber:hover:not(:disabled){background:#b07a38}
.btn-dark{background:#1a1a2e;color:#fff}.btn-dark:hover:not(:disabled){background:#282840}
.btn-red{background:#e53e3e;color:#fff}.btn-red:hover:not(:disabled){background:#c53030}
.btn-green{background:#27ae60;color:#fff}.btn-green:hover:not(:disabled){background:#1e8449}
.btn-ghost{background:#fff;border:1.5px solid #ddd;color:#555}
.btn-ghost:hover:not(:disabled){border-color:#999;color:#222}
.mono{font-family:'DM Mono',monospace}
.lbl{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;
  letter-spacing:.13em;display:block;margin-bottom:4px}
.card{background:#fff;border:1px solid #e8e2d8;border-radius:14px;overflow:hidden}
.view{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
table{width:100%;border-collapse:collapse}
th{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;
   letter-spacing:.1em;padding:11px 14px;text-align:left;font-weight:500;background:#faf8f4;white-space:nowrap}
td{padding:10px 14px;font-size:13px;border-top:1px solid #ede8e0;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;white-space:nowrap}
.bg-g{background:#edf7f2;color:#1e6e44;border:1px solid #b0dfc0}
.bg-r{background:#fef0f0;color:#b02020;border:1px solid #f0b0b0}
.bg-a{background:#fef8ed;color:#8a5a10;border:1px solid #e8c878}
.bg-b{background:#eef5ff;color:#1a4a90;border:1px solid #90b8f0}
.bg-m{background:#f5f0ff;color:#5a1a90;border:1px solid #c090f0}
.toast{position:fixed;bottom:24px;right:20px;background:#1a1a2e;color:#fff;
  border-radius:11px;padding:12px 18px;font-size:13px;
  box-shadow:0 6px 28px rgba(0,0,0,.2);z-index:9999;max-width:320px;line-height:1.5;
  opacity:0;transform:translateY(10px);transition:all .28s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.s2{grid-column:1/-1}
@media(max-width:560px){.fg{grid-template-columns:1fr}.s2{grid-column:1}}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.sli{position:absolute;inset:0;background:#ddd;border-radius:24px;cursor:pointer;transition:.25s}
.sli:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.sli{background:#6ec89a}
input:checked+.sli:before{transform:translateX(20px)}
.tl-row{display:grid;grid-template-columns:88px 1fr;border-bottom:1px solid #f0ece4}
.tl-row:last-child{border-bottom:none}
.tl-time{padding:11px 13px;font-family:'DM Mono',monospace;font-size:12px;color:#bbb;
  border-right:1px solid #f0ece4;background:#faf8f4;display:flex;align-items:center}
.tl-cell{padding:9px 13px;display:flex;align-items:center}
.dtab{padding:6px 12px;border:1.5px solid #e0dbd0;border-radius:8px;background:#fff;
  font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center}
.dtab:hover{border-color:#c8944a;color:#c8944a}
.dtab.act{background:#c8944a;border-color:#c8944a;color:#fff}
.stat-box{background:#fff;border:1px solid #e8e2d8;border-radius:12px;padding:14px 16px;text-align:center;min-width:76px}
.stat-num{font-family:'Playfair Display',serif;font-size:1.7rem;line-height:1}
.stat-lbl{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
.lcard{background:#fff;border:2px solid #e8e2d8;border-radius:16px;padding:26px 22px;
  cursor:pointer;text-align:left;transition:all .18s;width:100%}
.lcard:hover{border-color:#c8944a;transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,148,74,.12)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:400px;width:100%;
  box-shadow:0 16px 60px rgba(0,0,0,.28)}
.cancel-btn{padding:5px 10px;border:1.5px solid #f5c0c0;border-radius:7px;background:#fff;
  color:#c0392b;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cancel-btn:hover{background:#fff0f0;border-color:#e53e3e}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:#edf7f2;
  border:1px solid #b0dfc0;border-radius:20px;padding:4px 12px;
  font-family:'DM Mono',monospace;font-size:11px;color:#1e6e44}
.pin-box{background:#fff;border:1.5px solid #e0dbd0;border-radius:18px;
  padding:34px 30px;max-width:340px;margin:60px auto 0;text-align:center}
.setup-box{background:#fff;border:2px solid #e0dbd0;border-radius:18px;
  padding:32px 28px;max-width:500px;margin:40px auto 0}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast-el"></div>

<div class="modal-bg" id="cancel-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="font-size:30px;text-align:center;margin-bottom:10px">⚠️</div>
    <h3 style="font-family:'Playfair Display',serif;font-size:1.2rem;text-align:center;margin-bottom:6px">Cancel Interview?</h3>
    <p style="font-size:13px;color:#888;text-align:center;line-height:1.6;margin-bottom:8px">
      This will free the slot so another candidate can register.
    </p>
    <div id="modal-info" style="background:#fff5f5;border:1px solid #f5c0c0;border-radius:9px;
      padding:13px 16px;margin-bottom:18px;text-align:center"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Keep It</button>
      <button class="btn btn-red" style="flex:1" id="confirm-btn" onclick="confirmCancel()">
        Yes, Cancel &amp; Free Slot
      </button>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════════
const ADMIN_PIN = '1234';
const IVS = [
  { id:'kk', name:'Kondareddy', full:'Gavireddy Kondareddy', ini:'GK', color:'#c8944a' },
  { id:'rr', name:'Ramireddy',  full:'Ramireddy',            ini:'RR', color:'#4a90c8' },
];
const DAYS       = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAYS_AHEAD = 7;
const FILL_TIMEOUT_MS = 2 * 60 * 1000; // 2 minutes
const CACHE_KEY = 'iv_cache_v4';

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2,10); }

function localDate(n=0) {
  const d = new Date(); d.setDate(d.getDate()+n);
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function dayName(ds) { const[y,m,d]=ds.split('-').map(Number); return DAYS[new Date(y,m-1,d).getDay()]; }
function fmtDate(ds) { const[y,m,d]=ds.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(t)  { const[h,m]=t.split(':').map(Number); return `${h>12?h-12:h||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`; }
function fmtAt(iso)  { return iso?new Date(iso).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'; }
function esc(s)      { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ivById(id)  { return IVS.find(i=>i.id===id)||IVS[0]; }
function sleep(ms)   { return new Promise(r=>setTimeout(r,ms)); }

function makeTimes() { const t=[]; for(let h=9;h<20;h++){t.push(`${h}:00`);t.push(`${h}:30`);} return t; }
const TIMES = makeTimes();

function durSlots(dur) {
  if(dur==='1 hr')    return 2;
  if(dur==='1.5 hrs') return 3;
  if(dur==='2 hrs')   return 4;
  return 1;
}

function blankSlot(ivId,date,time) {
  return {id:uid(),ivId,date,time,status:'available',
    name:null,email:null,phone:null,position:null,experience:null,
    duration:null,notes:null,linkedTo:null,filledAt:null,fillingAt:null,sid:null};
}

function addMissingDates(slots) {
  const req = Array.from({length:DAYS_AHEAD},(_,i)=>localDate(i));
  const ex  = new Set(slots.map(s=>s.date));
  let added = false;
  for(const date of req) {
    if(!ex.has(date)) {
      for(const iv of IVS) for(const time of TIMES) slots=[...slots,blankSlot(iv.id,date,time)];
      added=true;
    }
  }
  return {slots,added};
}

function expireFilling(slots) {
  const now=Date.now();
  return slots.map(s=>
    s.status==='filling'&&s.fillingAt&&now-new Date(s.fillingAt).getTime()>FILL_TIMEOUT_MS
      ?{...s,status:'available',fillingAt:null,sid:null}:s);
}

function applyDSM(slots) {
  return slots.map(s=>{
    if(s.ivId==='kk'&&s.time==='13:00'&&s.status==='available'){
      const[y,m,d]=s.date.split('-').map(Number);
      const dow=new Date(y,m-1,d).getDay();
      if(dow>=1&&dow<=5) return{...s,status:'dsm'};
    }
    return s;
  });
}

function processSlots(raw) {
  let slots=expireFilling(raw||[]);
  const{slots:wd}=addMissingDates(slots);
  return applyDSM(wd);
}

// Strip available slots to minimal fields to save storage space
function minifyForStorage(slots) {
  const today=localDate(0);
  return slots
    .filter(s=>s.date>=today||s.status==='booked')
    .map(s=>{
      if(s.status==='booked'||s.status==='filling'){
        // Keep all non-null fields
        const o={};
        for(const[k,v] of Object.entries(s)) if(v!==null&&v!==undefined&&v!=='') o[k]=v;
        return o;
      }
      return{id:s.id,ivId:s.ivId,date:s.date,time:s.time,status:'available'};
    });
}

// ═══════════════════════════════════════════════════════════════════════════════
// JSONBIN DATABASE
// ═══════════════════════════════════════════════════════════════════════════════
const JB_KEY   = '$2a$10$BTD2e43NYyQThu0hJfJUbOj2X3Xz/n50FarlnMOAdE4c9CnrXCHuW';
const JB_BIN   = '69d4b83faaba882197d0d436';
const JB_URL   = 'https://api.jsonbin.io/v3';

function saveCache(data) {
  try{ localStorage.setItem(CACHE_KEY,JSON.stringify(data)); }catch(_){}
}
function loadCache() {
  try{ const r=localStorage.getItem(CACHE_KEY); return r?JSON.parse(r):null; }catch(_){ return null; }
}

async function apiRead() {
  const r = await Promise.race([
    fetch(`${JB_URL}/b/${JB_BIN}/latest`, {
      headers: {
        'X-Master-Key': JB_KEY,
        'X-Access-Key': JB_KEY,
        'X-Bin-Meta': 'false'
      }
    }),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('Read timeout')),30000))
  ]);
  if(!r.ok) throw new Error('Read '+r.status);
  const data = await r.json();
  saveCache(data);
  return data;
}

async function apiWrite(data) {
  // Compact data before writing to stay under 100kb limit
  const payload = {
    slots: minifyForStorage(data.slots||[]),
    avail: data.avail||{},
    cancelLog: (data.cancelLog||[]).slice(-50),
  };
  const r = await fetch(`${JB_URL}/b/${JB_BIN}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JB_KEY,
      'X-Access-Key': JB_KEY,
    },
    body: JSON.stringify(payload),
  });
  if(!r.ok) {
    const err = await r.text().catch(()=>'');
    throw new Error('Write '+r.status+': '+err);
  }
  saveCache(payload);
  return payload;
}

async function apiReadWithRetry(n=3) {
  let err;
  for(let i=0;i<n;i++){
    try{ return await apiRead(); }
    catch(e){ err=e; if(i<n-1) await sleep(2000); }
  }
  const cached=loadCache();
  if(cached) return cached;
  throw err;
}

// ═══════════════════════════════════════════════════════════════════════════════
// ATOMIC WRITE — read fresh → apply change → write back
// ═══════════════════════════════════════════════════════════════════════════════
let _writing=false;

async function atomicUpdate(changeFn) {
  if(_writing) throw new Error('BUSY');
  _writing=true;
  try{
    let fresh;
    try{ fresh=await apiRead(); }
    catch(_){ fresh=loadCache(); }
    if(!fresh) throw new Error('No data. Check internet connection.');
    const{slots:wd}=addMissingDates(expireFilling(fresh.slots||[]));
    const updated=changeFn({...fresh,slots:wd});
    return await apiWrite(updated);
  } finally{ _writing=false; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════════
const S={
  view:'loading',
  slots:[],avail:{},cancelLog:[],
  ivId:null,activeDay:null,
  activeSlotId:null,successSlot:null,
  cancelTargetId:null,pinError:false,
};
let _pollTimer=null;

// ═══════════════════════════════════════════════════════════════════════════════
// BOOT — always shows UI instantly
// ═══════════════════════════════════════════════════════════════════════════════
async function boot() {
  // Gist credentials are pre-configured — go straight to app

  // Show from cache instantly
  const cached=loadCache();
  if(cached){
    S.slots=processSlots(cached.slots||[]);
    S.avail=cached.avail||{};
    S.cancelLog=cached.cancelLog||[];
  } else {
    S.slots=processSlots([]);
    S.avail={}; S.cancelLog=[];
  }
  S.activeDay=localDate(0);
  S.view='landing';
  render(); // Instant UI

  // Sync from network in background
  syncInBackground();
  startPoll();
}

async function syncInBackground() {
  try{
    const data=await apiReadWithRetry(2);
    const raw=expireFilling(data.slots||[]);
    const{slots:wd,added}=addMissingDates(raw);
    S.slots=applyDSM(wd);
    S.avail=data.avail||{};
    S.cancelLog=data.cancelLog||[];
    if(['landing','candidate','iv-panel'].includes(S.view)) render();
    // Write new dates if added
    if(added&&!_writing){
      _writing=true;
      try{
        const fresh=await apiRead();
        const{slots:fwd}=addMissingDates(expireFilling(fresh.slots||[]));
        const written=await apiWrite({...fresh,slots:fwd});
        S.slots=applyDSM(expireFilling(written.slots||[]));
        if(['landing','candidate','iv-panel'].includes(S.view)) render();
      }catch(_){}
      finally{ _writing=false; }
    }
  }catch(_){}
}

function startPoll(){
  clearInterval(_pollTimer);
  _pollTimer=setInterval(async()=>{
    if(document.hidden) return;
    if(['loading','form','pin','setup'].includes(S.view)) return;
    if(_writing) return;
    try{
      const data=await apiRead();
      S.slots=processSlots(data.slots||[]);
      S.avail=data.avail||{};
      S.cancelLog=data.cancelLog||[];
      render();
    }catch(_){}
  },20000);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
// CANDIDATE ACTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function startRegister(slotId) {
  const slot=S.slots.find(s=>s.id===slotId);
  if(!slot){ toast('Slot not found. Tap Refresh.'); return; }
  if(slot.status==='dsm')     { toast('This slot is reserved.'); return; }
  if(slot.status==='booked')  { toast('This slot is already booked.'); return; }
  if(slot.status==='filling') { toast('Someone is registering this slot. Pick another.'); return; }
  S.activeSlotId=slotId; S.view='form'; render();
}

function cancelForm() {
  S.activeSlotId=null; S.view='candidate'; render();
}

async function submitForm() {
  const name=document.getElementById('f-name')?.value?.trim();
  const email=document.getElementById('f-email')?.value?.trim();
  const dur=document.getElementById('f-dur')?.value;
  if(!name||!email){ toast('Name and email are required.'); return; }
  if(!dur){ toast('Please select interview duration.'); return; }

  const btn=document.getElementById('submit-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Confirming…';}

  const fd={name,email,
    phone:document.getElementById('f-phone')?.value?.trim()||'',
    position:document.getElementById('f-position')?.value?.trim()||'',
    experience:document.getElementById('f-exp')?.value?.trim()||'',
    duration:dur,
    notes:document.getElementById('f-notes')?.value?.trim()||''};

  const localSlot=S.slots.find(s=>s.id===S.activeSlotId);
  if(!localSlot){ toast('Slot not found. Go back and try again.'); if(btn){btn.disabled=false;btn.textContent='Confirm Registration →';} return; }

  try{
    const result=await atomicUpdate(fresh=>{
      const slots=expireFilling(fresh.slots||[]);
      // Find by ID or fallback to ivId+date+time
      let slot=slots.find(s=>s.id===S.activeSlotId);
      if(!slot) slot=slots.find(s=>s.ivId===localSlot.ivId&&s.date===localSlot.date&&s.time===localSlot.time&&s.status==='available');
      if(!slot)                   throw new Error('NOTFOUND');
      if(slot.status==='booked')  throw new Error('TAKEN');

      // Block follow-up slots based on duration
      const numSlots=durSlots(fd.duration);
      const startIdx=TIMES.indexOf(slot.time);
      const followIds=[];
      for(let i=1;i<numSlots;i++){
        const t=TIMES[startIdx+i];
        if(!t) break;
        const fs=slots.find(s=>s.ivId===slot.ivId&&s.date===slot.date&&s.time===t);
        if(fs&&fs.status==='booked') throw new Error('FOLLOW_TAKEN');
        if(fs) followIds.push(fs.id);
      }

      const now=new Date().toISOString();
      return{
        slots:slots.map(s=>{
          if(s.id===slot.id) return{...s,status:'booked',...fd,filledAt:now,fillingAt:null,sid:null};
          if(followIds.includes(s.id)) return{...s,status:'booked',name:fd.name,email:fd.email,
            duration:fd.duration,position:fd.position,linkedTo:slot.id,filledAt:now,fillingAt:null,sid:null};
          return s;
        }),
        avail:fresh.avail||{},
        cancelLog:fresh.cancelLog||[],
      };
    });
    S.slots=processSlots(result.slots);
    S.avail=result.avail; S.cancelLog=result.cancelLog;
    S.successSlot=S.slots.find(s=>s.ivId===localSlot.ivId&&s.date===localSlot.date&&s.time===localSlot.time)
      ||{...localSlot,...fd,status:'booked'};
    S.activeSlotId=null; S.view='success'; render();
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Confirm Registration →';}
    if(e.message==='TAKEN'||e.message==='FOLLOW_TAKEN')
      toast('This slot was just booked by someone else. Please pick another.');
    else if(e.message==='BUSY') toast('Please wait a moment and try again.');
    else if(e.message==='NOTFOUND') toast('Slot not found. Please go back and refresh.');
    else toast('Save failed. Please check internet and try again.');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN ACTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function checkPin() {
  const pin=document.getElementById('pin-input')?.value?.trim();
  if(pin===ADMIN_PIN){S.pinError=false;S.view='iv-select';render();}
  else{S.pinError=true;render();}
}

function toggleAvail(ivId,date,val) {
  if(!S.avail[ivId]) S.avail[ivId]={};
  S.avail[ivId][date]=val;
  const avail=JSON.parse(JSON.stringify(S.avail));
  atomicUpdate(fresh=>({slots:fresh.slots||[],avail,cancelLog:fresh.cancelLog||[]}))
    .catch(()=>toast('Error saving availability.'));
  render();
}
function getAvail(ivId,date) {
  if(!S.avail[ivId]) return true;
  return S.avail[ivId][date]!==undefined?S.avail[ivId][date]:true;
}

let _cancelBusy=false;
function openCancelModal(slotId) {
  const slot=S.slots.find(s=>s.id===slotId);
  if(!slot){toast('Slot not found.');return;}
  S.cancelTargetId=slotId; _cancelBusy=false; _writing=false;
  const btn=document.getElementById('confirm-btn');
  if(btn){btn.disabled=false;btn.innerHTML='Yes, Cancel &amp; Free Slot';}
  document.getElementById('modal-info').innerHTML=`
    <div style="font-weight:700;font-size:14px;color:#1a1a2e;margin-bottom:4px">${esc(slot.name)}</div>
    <div class="mono" style="font-size:12px;color:#888;margin-bottom:6px">${esc(slot.email)}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <span class="mono" style="font-size:12px;color:#c8944a">${dayName(slot.date)}, ${fmtDate(slot.date)}</span>
      <span class="mono" style="font-size:12px;color:#4a90c8;font-weight:700">${fmtTime(slot.time)}</span>
    </div>`;
  document.getElementById('cancel-modal').style.display='flex';
}
function closeModal() {
  document.getElementById('cancel-modal').style.display='none';
  S.cancelTargetId=null; _cancelBusy=false;
  const btn=document.getElementById('confirm-btn');
  if(btn){btn.disabled=false;btn.innerHTML='Yes, Cancel &amp; Free Slot';}
}

async function confirmCancel() {
  if(_cancelBusy) return;
  const slotId=S.cancelTargetId;
  if(!slotId){closeModal();return;}
  _cancelBusy=true;
  const btn=document.getElementById('confirm-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Cancelling…';}
  const adminName=ivById(S.ivId)?.full||'Admin';
  try{
    const result=await atomicUpdate(fresh=>{
      const slot=(fresh.slots||[]).find(s=>s.id===slotId);
      if(!slot||slot.status!=='booked') throw new Error('NOTBOOKED');
      const log={id:uid(),slotId:slot.id,ivId:slot.ivId,date:slot.date,time:slot.time,
        name:slot.name,email:slot.email,phone:slot.phone||'',position:slot.position||'',
        duration:slot.duration||'',cancelledAt:new Date().toISOString(),cancelledBy:adminName};
      return{
        slots:(fresh.slots||[]).map(s=>
          s.id===slotId||s.linkedTo===slotId
            ?{...s,status:'available',name:null,email:null,phone:null,position:null,
                experience:null,duration:null,notes:null,linkedTo:null,
                filledAt:null,fillingAt:null,sid:null}:s),
        avail:fresh.avail||{},
        cancelLog:[...(fresh.cancelLog||[]),log],
      };
    });
    S.slots=processSlots(result.slots);
    S.cancelLog=result.cancelLog;
    closeModal();
    toast('✅ Cancelled. Slot is free for others to book.');
    render();
  }catch(e){
    _cancelBusy=false;
    if(btn){btn.disabled=false;btn.innerHTML='Yes, Cancel &amp; Free Slot';}
    if(e.message==='NOTBOOKED') toast('Slot is not currently booked.');
    else toast('Save failed. Please try again.');
  }
}

async function exportCSV() {
  let data; try{data=await apiReadWithRetry();}catch(_){data=loadCache();}
  if(!data){toast('No data.');return;}
  const booked=(data.slots||[]).filter(s=>s.status==='booked'&&!s.linkedTo);
  if(!booked.length){toast('No bookings to export.');return;}
  const rows=[['Name','Email','Phone','Position','Experience','Duration','Notes','Interviewer','Date','Day','Time']];
  booked.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).forEach(s=>{
    const iv=ivById(s.ivId);
    rows.push([s.name||'',s.email||'',s.phone||'',s.position||'',s.experience||'',
      s.duration||'30 min',s.notes||'',iv.full,s.date,dayName(s.date),fmtTime(s.time)]);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),
    {href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),
     download:`bookings-${localDate()}.csv`});
  a.click(); toast(`✅ Exported ${booked.length} bookings.`);
}

async function exportBackup() {
  let data; try{data=await apiReadWithRetry();}catch(_){data=loadCache();}
  if(!data){toast('No data.');return;}
  const bk={exportedAt:new Date().toISOString(),...data};
  const a=Object.assign(document.createElement('a'),
    {href:URL.createObjectURL(new Blob([JSON.stringify(bk,null,2)],{type:'application/json'})),
     download:`backup-${localDate()}.json`});
  a.click(); toast('✅ Backup downloaded.');
}

async function restoreBackup() {
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    try{
      const bk=JSON.parse(await file.text());
      if(!bk.slots||!Array.isArray(bk.slots)){toast('Invalid backup file.');return;}
      const booked=bk.slots.filter(s=>s.status==='booked').length;
      if(!confirm(`Restore from ${bk.exportedAt?new Date(bk.exportedAt).toLocaleString():'unknown'}?\n\nThis will restore ${booked} bookings.`)) return;
      await atomicUpdate(()=>({slots:bk.slots,avail:bk.avail||{},cancelLog:bk.cancelLog||[]}));
      S.slots=processSlots(bk.slots); S.avail=bk.avail||{}; S.cancelLog=bk.cancelLog||[];
      toast(`✅ Restored! ${booked} bookings recovered.`); render();
    }catch(_){toast('Restore failed. Invalid file.');}
  };
  inp.click();
}

async function refreshData() {
  try{
    const data=await apiReadWithRetry();
    S.slots=processSlots(data.slots||[]);
    S.avail=data.avail||{}; S.cancelLog=data.cancelLog||[];
    render(); toast('✅ Refreshed.');
  }catch(_){toast('No connection. Please try again.');}
}

        <div>
          <div style="font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700">
            ${dayName(activeDate)}${activeDate===todayStr?` <span class="badge bg-a" style="font-size:9px;vertical-align:middle;margin-left:5px">Today</span>`:''}
          </div>
          <div class="mono" style="font-size:11px;color:#aaa;margin-top:2px">${fmtDate(activeDate)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
          ${dayBooked.length>0?`<span class="badge bg-g">${dayBooked.length} booked</span>`:''}
          ${dayLog.length>0?`<span class="badge bg-r">${dayLog.length} cancelled</span>`:''}
          <span class="badge ${dayAvl?'bg-g':'bg-r'}">${dayAvl?'✓ Available':'✗ Unavailable'}</span>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="mono" style="font-size:11px;color:#aaa">${dayAvl?'Mark unavailable':'Mark available'}</span>
            <label class="tog"><input type="checkbox" ${dayAvl?'checked':''}
              onchange="toggleAvail('${iv.id}','${activeDate}',this.checked)"/><span class="sli"></span></label>
          </div>
        </div>
      </div>
      <div class="card" style="margin-bottom:4px">
        <div style="padding:9px 14px;background:#faf8f4;border-bottom:1px solid #ede8e0;
          display:flex;align-items:center;justify-content:space-between">
          <span class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.12em">
            Timeline · 9:00 AM – 8:00 PM</span>
          <span class="mono" style="font-size:10px;color:#aaa">${daySlots.filter(s=>s.status==='available').length} free</span>
        </div>
        ${tlRows}
      </div>
      ${dayBooked.length>0?`
        <div style="margin-top:20px">
          <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.13em;margin-bottom:11px">
            📋 Booked — ${dayName(activeDate)} (${dayBooked.length})</div>
          <div class="card" style="overflow-x:auto">
            <table><thead><tr><th>Time</th><th>Candidate</th><th>Duration</th><th>Position</th>
              <th>Experience</th><th>Contact</th><th>Notes</th><th>Action</th></tr></thead>
            <tbody>${detailRows}</tbody></table>
          </div>
        </div>`:''}
      ${dayLog.length>0?`
        <div style="margin-top:18px">
          <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.13em;margin-bottom:11px">
            ✗ Cancelled — ${dayName(activeDate)}</div>
          <div class="card" style="overflow-x:auto">
            <table><thead><tr><th>Time</th><th>Candidate</th><th>Email</th><th>Cancelled At</th><th>By</th></tr></thead>
            <tbody>${cancelRows}</tbody></table>
          </div>
        </div>`:''}
      <div style="margin-top:20px;display:flex;gap:7px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-ghost" onclick="S.view='iv-select';render()" style="font-size:12px">← Switch</button>
        <button class="btn btn-ghost" onclick="goLanding()" style="font-size:12px">🏠 Home</button>
        <div style="flex:1"></div>
        <button class="btn btn-ghost" onclick="exportCSV()" style="font-size:12px;color:#1a4a90;border-color:#90b8f0">📊 CSV</button>
        <button class="btn btn-ghost" onclick="exportBackup()" style="font-size:12px;color:#1e6e44;border-color:#b0dfc0">💾 Backup</button>
        <button class="btn btn-ghost" onclick="restoreBackup()" style="font-size:12px;color:#8a5a10;border-color:#e8c878">📂 Restore</button>
      </div>
    </div>`;
    return;
  }

  // ── CANDIDATE BOARD ───────────────────────────────────────────────────────
  if(view==='candidate') {
    const ivSum=IVS.map(iv=>{
      const avl=getAvail(iv.id,todayStr);
      const booked=visible.filter(s=>s.ivId===iv.id&&s.status==='booked'&&!s.linkedTo).length;
      const open=visible.filter(s=>s.ivId===iv.id&&s.status==='available').length;
      return`<div style="background:#fff;border:1.5px solid #e8e2d8;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:50%;background:${iv.color};
          display:flex;align-items:center;justify-content:center;color:#fff;
          font-family:'DM Mono',monospace;font-size:13px;flex-shrink:0">${iv.ini}</div>
        <div><div style="font-weight:600;font-size:14px">${iv.full}</div>
          <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
            <span class="badge ${avl?'bg-g':'bg-r'}" style="font-size:9px">${avl?'✓ Available today':'✗ Unavailable today'}</span>
            <span class="badge bg-b" style="font-size:9px">${booked} booked</span>
            <span class="badge bg-a" style="font-size:9px">${open} open</span>
          </div>
        </div>
      </div>`;}).join('');

    const sections=dates.map(date=>{
      const kkS=visible.filter(s=>s.ivId==='kk'&&s.date===date).sort((a,b)=>a.time.localeCompare(b.time));
      const rrS=visible.filter(s=>s.ivId==='rr'&&s.date===date).sort((a,b)=>a.time.localeCompare(b.time));
      const kkA=getAvail('kk',date), rrA=getAvail('rr',date);
      const bc=[...kkS,...rrS].filter(s=>s.status==='booked'&&!s.linkedTo).length;
      const allT=[...new Set([...kkS,...rrS].map(s=>s.time))].sort();

      const cell=(slot,iv,ivA)=>{
        if(!slot) return`<td style="padding:8px 11px;border-left:1px solid #f0ece4;color:#eee;font-size:11px">—</td>`;
        const isB=slot.status==='booked', isF=slot.status==='filling', isD=slot.status==='dsm';
        const na=slot.status==='available'&&!ivA;
        return`<td style="padding:8px 11px;border-left:1px solid #f0ece4;background:${isB?'#f4fbf7':isF?'#fffbf0':'#fff'}">
          ${isD?`<span class="mono" style="font-size:11px;color:#aaa;background:#f0ece4;padding:3px 8px;border-radius:5px">DSM</span>`
          :isB&&slot.linkedTo?`<span class="mono" style="font-size:11px;color:#aaa;background:#edf7f2;padding:3px 8px;border-radius:5px">↳ ${esc(slot.name)}</span>`
          :isB?`<span style="font-weight:600;font-size:12px;color:#1e6e44">${esc(slot.name)}</span>
            <div class="mono" style="font-size:10px;color:#aaa;margin-top:2px">Duration: ${esc(slot.duration||'30 min')}</div>
            <div class="mono" style="font-size:10px;color:#6ec89a;margin-top:1px">✓ Booked</div>`
          :isF?`<span class="badge bg-a" style="font-size:9px">⏳ Registering…</span>`
          :na?`<span class="mono" style="font-size:11px;color:#ddd">Unavailable</span>`
          :`<button onclick="startRegister('${slot.id}')"
            style="padding:6px 11px;background:${iv.color};color:#fff;border:none;
            border-radius:7px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer">
            Register →</button>`}
        </td>`;};

      return`<div style="margin-bottom:26px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap">
          <span style="font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700">${dayName(date)}</span>
          ${date===todayStr?`<span class="badge bg-a" style="font-size:9px">Today</span>`:''}
          <span class="mono" style="font-size:11px;color:#aaa">${fmtDate(date)}</span>
          ${bc>0?`<span class="badge bg-b" style="font-size:9px">${bc} booked</span>`:''}
          ${!(kkA||rrA)?`<span class="badge bg-r" style="font-size:9px">Both unavailable</span>`:''}
          <div style="flex:1;height:1px;background:#e8e2d8;min-width:16px"></div>
        </div>
        <div class="card">
          <table><thead><tr>
            <th style="width:86px">Time</th>
            <th><span style="display:inline-flex;align-items:center;gap:5px">
              <span style="width:8px;height:8px;border-radius:50%;background:#c8944a;display:inline-block"></span>
              Kondareddy ${!kkA?`<span class="badge bg-r" style="font-size:8px;margin-left:3px">Unavailable</span>`:''}</span></th>
            <th><span style="display:inline-flex;align-items:center;gap:5px">
              <span style="width:8px;height:8px;border-radius:50%;background:#4a90c8;display:inline-block"></span>
              Ramireddy ${!rrA?`<span class="badge bg-r" style="font-size:8px;margin-left:3px">Unavailable</span>`:''}</span></th>
          </tr></thead>
          <tbody>${allT.map(t=>`<tr>
            <td class="mono" style="padding:8px 11px;font-size:12px;color:#999;white-space:nowrap;background:#faf8f4">${fmtTime(t)}</td>
            ${cell(kkS.find(s=>s.time===t),IVS[0],kkA)}
            ${cell(rrS.find(s=>s.time===t),IVS[1],rrA)}
          </tr>`).join('')}</tbody></table>
        </div>
      </div>`;}).join('');

    app.innerHTML=`<div class="view">
      ${hdr('Candidate portal · 9 AM – 8 PM','goLanding()')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:22px">${ivSum}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:7px">
        <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.13em">📅 Interview Slots</div>
        <button class="btn btn-ghost" onclick="refreshData()" style="font-size:11px;padding:6px 12px">↻ Refresh</button>
      </div>
      ${sections}
      ${bookedAll.length>0?`
        <div style="margin-top:8px">
          <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.13em;margin-bottom:11px">
            ✅ All Registered Candidates (${bookedAll.length})</div>
          <div class="card" style="overflow-x:auto"><table>
            <thead><tr><th>Candidate</th><th>Interviewer</th><th>Day</th><th>Date</th><th>Time</th><th>Duration</th><th>Position</th></tr></thead>
            <tbody>${bookedAll.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).map((s,i)=>{
              const iv=ivById(s.ivId);
              return`<tr style="background:${i%2?'#fdfcf8':'#fff'}">
                <td><strong>${esc(s.name)}</strong><div class="mono" style="font-size:11px;color:#aaa">${esc(s.email)}</div></td>
                <td><span style="display:inline-flex;align-items:center;gap:5px">
                  <span style="width:8px;height:8px;border-radius:50%;background:${iv.color};display:inline-block"></span>${iv.name}</span></td>
                <td class="mono" style="font-size:12px;color:#888">${dayName(s.date)}</td>
                <td class="mono" style="font-size:12px;color:#888">${fmtDate(s.date)}</td>
                <td class="mono" style="color:${iv.color};font-weight:600">${fmtTime(s.time)}</td>
                <td class="mono" style="font-size:12px;color:#888">${esc(s.duration||'30 min')}</td>
                <td style="color:#666">${esc(s.position||'—')}</td>
              </tr>`;}).join('')}
            </tbody></table></div>
        </div>`:''}
    </div>`;
    return;
  }

  // ── FORM ─────────────────────────────────────────────────────────────────
  if(view==='form') {
    const slot=S.slots.find(s=>s.id===S.activeSlotId);
    const iv=slot?ivById(slot.ivId):IVS[0];
    app.innerHTML=`<div class="view">
      ${hdr('Register for interview','cancelForm()')}
      <div style="max-width:520px;margin:0 auto">
        <div style="background:#fff;border:2px solid ${iv.color}40;border-radius:12px;padding:16px 20px;margin-bottom:20px">
          <span class="lbl" style="color:${iv.color}">Your Confirmed Slot</span>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:3px">
            <div><span class="lbl">Interviewer</span>
              <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
                <span style="width:8px;height:8px;border-radius:50%;background:${iv.color};display:inline-block"></span>
                <span style="font-weight:600;font-size:13px">${iv.name}</span>
              </div></div>
            <div><span class="lbl">Date</span>
              <div style="font-weight:500;font-size:13px;margin-top:2px">${slot?dayName(slot.date)+', '+fmtDate(slot.date):'—'}</div></div>
            <div><span class="lbl">Time</span>
              <div style="font-weight:700;font-size:14px;color:${iv.color};margin-top:2px">${slot?fmtTime(slot.time):'—'}</div></div>
          </div>
        </div>
        <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.13em;margin-bottom:13px">Your Details</div>
        <div class="fg" style="margin-bottom:12px">
          <div class="s2"><span class="lbl">Full Name *</span><input id="f-name" placeholder="Your full name"/></div>
          <div><span class="lbl">Email *</span><input id="f-email" type="email" placeholder="you@email.com"/></div>
          <div><span class="lbl">Phone</span><input id="f-phone" type="tel" placeholder="+91 98765 43210"/></div>
          <div><span class="lbl">Position Applied</span><input id="f-position" placeholder="e.g. Software Engineer"/></div>
          <div><span class="lbl">Years of Experience</span><input id="f-exp" placeholder="e.g. 4 years"/></div>
          <div><span class="lbl">Interview Duration *</span>
            <select id="f-dur">
              <option value="">Select duration</option>
              <option value="30 min">30 min</option>
              <option value="1 hr">1 hr</option>
              <option value="1.5 hrs">1.5 hrs</option>
              <option value="2 hrs">2 hrs</option>
            </select></div>
          <div class="s2"><span class="lbl">Notes for Interviewer</span>
            <textarea id="f-notes" placeholder="Anything you'd like the interviewer to know…"></textarea></div>
        </div>
        <div style="display:flex;gap:9px">
          <button class="btn btn-ghost" onclick="cancelForm()">Cancel</button>
          <button class="btn btn-amber" id="submit-btn" onclick="submitForm()" style="flex:1">Confirm Registration →</button>
        </div>
        <p class="mono" style="text-align:center;font-size:10px;color:#ccc;margin-top:8px">* Required · Slot held for 2 minutes</p>
      </div>
    </div>`;
    return;
  }

  // ── SUCCESS ───────────────────────────────────────────────────────────────
  if(view==='success') {
    const s=S.successSlot; const iv=s?ivById(s.ivId):IVS[0];
    app.innerHTML=`<div class="view" style="text-align:center;padding:36px 20px;max-width:440px;margin:0 auto">
      ${hdr('Registration confirmed','goLanding()')}
      <div style="font-size:54px;margin:6px 0 12px">🎉</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a1a2e;margin-bottom:7px">
        All set, ${esc(s?.name?.split(' ')[0])}!
      </h2>
      <p style="color:#888;font-size:14px;margin-bottom:20px;line-height:1.7">Your interview is confirmed.</p>
      <div style="background:#fff;border:2px solid ${iv.color}38;border-radius:12px;padding:18px 24px;margin-bottom:20px;text-align:left">
        ${[['Interviewer',iv.full],['Day',s?dayName(s.date):''],['Date',s?fmtDate(s.date):''],
           ['Time',s?fmtTime(s.time):''],['Duration',s?.duration||'30 min'],['Position',s?.position||'—']]
          .map(([l,v])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0ece4">
            <span class="lbl">${l}</span>
            <span style="font-size:14px;font-weight:600;color:#1a1a2e">${esc(v)}</span>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="S.view='candidate';S.successSlot=null;render()">← View Schedule</button>
        <button class="btn btn-dark" onclick="goLanding()">🏠 Home</button>
      </div>
    </div>`;
  }
}

boot();
</script>
</body>
</html>
