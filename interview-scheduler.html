<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Interview Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#f4f3ef;color:#1a1a2e;min-height:100vh}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 5% 0%,rgba(200,148,74,.1) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 95% 100%,rgba(106,180,232,.08) 0%,transparent 55%)}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:28px 18px 80px}
input,select,textarea{width:100%;background:#fff;border:1.5px solid #e0dbd0;border-radius:9px;
  padding:10px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:#1a1a2e;
  outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#c8944a;box-shadow:0 0 0 3px rgba(200,148,74,.1)}
textarea{resize:vertical;min-height:68px}
.btn{padding:10px 20px;border:none;border-radius:9px;font-family:'Outfit',sans-serif;
  font-weight:600;font-size:13px;cursor:pointer;transition:all .18s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-amber{background:#c8944a;color:#fff}.btn-amber:hover:not(:disabled){background:#b07a38}
.btn-dark{background:#1a1a2e;color:#fff}.btn-dark:hover:not(:disabled){background:#282840}
.btn-red{background:#e53e3e;color:#fff}.btn-red:hover:not(:disabled){background:#c53030}
.btn-ghost{background:#fff;border:1.5px solid #ddd;color:#555}
.btn-ghost:hover:not(:disabled){border-color:#999;color:#222}
.mono{font-family:'DM Mono',monospace}
.lbl{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;
  letter-spacing:.13em;display:block;margin-bottom:4px}
.card{background:#fff;border:1px solid #e8e2d8;border-radius:14px;overflow:hidden}
.view{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
table{width:100%;border-collapse:collapse}
th{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;
   letter-spacing:.1em;padding:11px 14px;text-align:left;font-weight:500;
   background:#faf8f4;white-space:nowrap}
td{padding:10px 14px;font-size:13px;border-top:1px solid #ede8e0;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;white-space:nowrap}
.bg-g{background:#edf7f2;color:#1e6e44;border:1px solid #b0dfc0}
.bg-r{background:#fef0f0;color:#b02020;border:1px solid #f0b0b0}
.bg-a{background:#fef8ed;color:#8a5a10;border:1px solid #e8c878}
.bg-b{background:#eef5ff;color:#1a4a90;border:1px solid #90b8f0}
.bg-m{background:#f5f0ff;color:#5a1a90;border:1px solid #c090f0}
.toast{position:fixed;bottom:24px;right:20px;background:#1a1a2e;color:#fff;
  border-radius:11px;padding:12px 18px;font-size:13px;
  box-shadow:0 6px 28px rgba(0,0,0,.2);z-index:9999;max-width:320px;line-height:1.5;
  opacity:0;transform:translateY(10px);transition:all .28s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.s2{grid-column:1/-1}
@media(max-width:560px){.fg{grid-template-columns:1fr}.s2{grid-column:1}}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.sli{position:absolute;inset:0;background:#ddd;border-radius:24px;cursor:pointer;transition:.25s}
.sli:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.sli{background:#6ec89a}
input:checked+.sli:before{transform:translateX(20px)}
.tl-row{display:grid;grid-template-columns:88px 1fr;border-bottom:1px solid #f0ece4}
.tl-row:last-child{border-bottom:none}
.tl-time{padding:11px 13px;font-family:'DM Mono',monospace;font-size:12px;color:#bbb;
  border-right:1px solid #f0ece4;background:#faf8f4;display:flex;align-items:center}
.tl-cell{padding:9px 13px;display:flex;align-items:center}
.dtab{padding:6px 12px;border:1.5px solid #e0dbd0;border-radius:8px;background:#fff;
  font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;
  transition:all .15s;white-space:nowrap;text-align:center}
.dtab:hover{border-color:#c8944a;color:#c8944a}
.dtab.act{background:#c8944a;border-color:#c8944a;color:#fff}
.stat-box{background:#fff;border:1px solid #e8e2d8;border-radius:12px;
  padding:14px 16px;text-align:center;min-width:76px}
.stat-num{font-family:'Playfair Display',serif;font-size:1.7rem;line-height:1}

  text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
.lcard{background:#fff;border:2px solid #e8e2d8;border-radius:16px;padding:26px 22px;
  cursor:pointer;text-align:left;transition:all .18s;width:100%}
.lcard:hover{border-color:#c8944a;transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(200,148,74,.12)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;
  display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:400px;width:100%;
  box-shadow:0 16px 60px rgba(0,0,0,.28)}
.cancel-btn{padding:5px 10px;border:1.5px solid #f5c0c0;border-radius:7px;background:#fff;
  color:#c0392b;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;
  transition:all .15s;white-space:nowrap}
.cancel-btn:hover{background:#fff0f0;border-color:#e53e3e}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;
  vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:#edf7f2;
  border:1px solid #b0dfc0;border-radius:20px;padding:4px 12px;
  font-family:'DM Mono',monospace;font-size:11px;color:#1e6e44}
.pin-box{background:#fff;border:1.5px solid #e0dbd0;border-radius:18px;
  padding:34px 30px;max-width:340px;margin:60px auto 0;text-align:center}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast-el"></div>

<!-- Cancel Modal -->
<div class="modal-bg" id="cancel-modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div style="font-size:30px;text-align:center;margin-bottom:10px">⚠️</div>
    <h3 style="font-family:'Playfair Display',serif;font-size:1.2rem;text-align:center;margin-bottom:6px">Cancel Interview?</h3>
    <p style="font-size:13px;color:#888;text-align:center;line-height:1.6;margin-bottom:8px">
      This will free the slot so another candidate can register.
    </p>
    <div id="modal-info" style="background:#fff5f5;border:1px solid #f5c0c0;border-radius:9px;
      padding:13px 16px;margin-bottom:18px;text-align:center"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Keep It</button>
      <button class="btn btn-red" style="flex:1" id="confirm-btn" onclick="confirmCancel()">
        Yes, Cancel &amp; Free Slot
      </button>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════════
const CFG = {
  key:   '$2a$10$BTD2e43NYyQThu0hJfJUbOj2X3Xz/n50FarlnMOAdE4c9CnrXCHuW',
  binId: '69d4b83faaba882197d0d436',
};
const ADMIN_PIN = '1234';
const IVS = [
  { id:'kk', name:'Kondareddy', full:'Gavireddy Kondareddy', ini:'GK', color:'#c8944a' },
  { id:'rr', name:'Ramireddy',  full:'Ramireddy',            ini:'RR', color:'#4a90c8' },
];
const DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SID   = Math.random().toString(36).slice(2, 10); // unique session id per tab
const JB    = 'https://api.jsonbin.io/v3';
const DAYS_AHEAD = 7;         // rolling window: today + 6 more days
const FILL_TIMEOUT_MS = 2 * 60 * 1000; // 2 minutes

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function uid() { return Math.random().toString(36).slice(2, 10); }

// Local date string (YYYY-MM-DD) — avoids UTC timezone bugs
function localDate(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function dayName(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  return DAYS[new Date(y, m - 1, d).getDay()];
}

function fmtDate(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function fmtTime(t) {
  const [h, m] = t.split(':').map(Number);
  return `${h > 12 ? h - 12 : h || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
}

function fmtEndTime(t) {
  const [h, m] = t.split(':').map(Number);
  const total = h * 60 + m + 30;
  const eh = Math.floor(total / 60), em = total % 60;
  return `${eh > 12 ? eh - 12 : eh || 12}:${String(em).padStart(2, '0')} ${eh >= 12 ? 'PM' : 'AM'}`;
}

function fmtAt(iso) {
  return iso ? new Date(iso).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function ivById(id) { return IVS.find(i => i.id === id) || IVS[0]; }

// Generate all 30-min slots 9:00–19:30 for one date + one interviewer
function makeTimes() {
  const t = [];
  for (let h = 9; h < 20; h++) { t.push(`${h}:00`); t.push(`${h}:30`); }
  return t;
}
const TIMES = makeTimes();

// Build a blank slot object
function blankSlot(ivId, date, time) {
  return {
    id: uid(), ivId, date, time,
    status: 'available',   // available | filling | booked
    name: null, email: null, phone: null,
    position: null, experience: null, duration: null, notes: null,
    filledAt: null, fillingAt: null, sid: null,
  };
}

// Add slots for any date in the rolling window that doesn't exist yet
// NEVER removes existing slots
function addMissingDates(slots) {
  const required = Array.from({ length: DAYS_AHEAD }, (_, i) => localDate(i));
  const existing = new Set(slots.map(s => s.date));
  let added = false;
  for (const date of required) {
    if (!existing.has(date)) {
      for (const iv of IVS) {
        for (const time of TIMES) {
          slots = [...slots, blankSlot(iv.id, date, time)];
        }
      }
      added = true;
    }
  }
  return { slots, added };
}

// Expire any "filling" slot whose timer ran out — LOCAL display only, doesn't write
function expireFillingSlots(slots) {
  const now = Date.now();
  return slots.map(s => {
    if (s.status === 'filling' && s.fillingAt &&
        now - new Date(s.fillingAt).getTime() > FILL_TIMEOUT_MS) {
      return { ...s, status: 'available', fillingAt: null, sid: null };
    }
    return s;
  });
}

// DSM rule: Kondareddy's 1:00 PM is blocked Mon–Fri
// Applied to local display only — never written as "dsm" status to DB
function applyDSM(slots) {
  return slots.map(s => {
    if (s.ivId === 'kk' && s.time === '13:00' && s.status === 'available') {
      const [y, m, d] = s.date.split('-').map(Number);
      const dow = new Date(y, m - 1, d).getDay();
      if (dow >= 1 && dow <= 5) return { ...s, status: 'dsm' };
    }
    return s;
  });
}

// Full local processing pipeline: expire + DSM + missing dates (display-only)
function processSlots(rawSlots) {
  let slots = expireFillingSlots(rawSlots || []);
  const { slots: withDates } = addMissingDates(slots);
  return applyDSM(withDates);
}

// ═══════════════════════════════════════════════════════════════════════════════
// CACHE (localStorage)
// ═══════════════════════════════════════════════════════════════════════════════
const CACHE_KEY = 'iv_v3';

function saveCache(data) {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    // Also keep a timestamped rolling backup (last 3 saves)
    const ts = Date.now();
    const bk = JSON.parse(localStorage.getItem('iv_backups') || '[]');
    bk.unshift({ ts, data });
    if (bk.length > 3) bk.length = 3; // keep only last 3
    localStorage.setItem('iv_backups', JSON.stringify(bk));
  } catch (_) {}
}

// Get most recent local backup
function getLocalBackup() {
  try {
    const bk = JSON.parse(localStorage.getItem('iv_backups') || '[]');
    return bk.length > 0 ? bk[0] : null;
  } catch (_) { return null; }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (_) { return null; }
}

// ═══════════════════════════════════════════════════════════════════════════════
// JSONBIN API
// ═══════════════════════════════════════════════════════════════════════════════
async function apiRead() {
  const r = await fetch(`${JB}/b/${CFG.binId}/latest`, {
    headers: {
      'X-Master-Key': CFG.key,
      'X-Access-Key': CFG.key,
      'X-Bin-Meta': 'false'
    },
  });
  if (!r.ok) throw new Error(`Read ${r.status}`);
  const data = await r.json();
  saveCache(data);
  return data;
}

async function apiReadWithRetry(attempts = 4) {
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try { return await apiRead(); }
    catch (e) {
      lastErr = e;
      if (i < attempts - 1) await sleep(Math.min(800 * Math.pow(2, i), 5000));
    }
  }
  throw lastErr;
}

async function apiWrite(data) {
  const r = await fetch(`${JB}/b/${CFG.binId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': CFG.key,
      'X-Access-Key': CFG.key,
    },
    body: JSON.stringify(data),
  });
  if (!r.ok) {
    const errText = await r.text().catch(()=>'');
    throw new Error(`Write ${r.status}: ${errText}`);
  }
  saveCache(data);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ───────────────────────────────────────────────────────────────────────────────
// ATOMIC WRITE — the ONLY way to write to JSONBin
// 1. Read the absolute latest data
// 2. Apply changeFn (which can throw to abort)
// 3. Write back
// This prevents race conditions: every write sees the freshest state
// ───────────────────────────────────────────────────────────────────────────────
let _writing = false;

async function atomicUpdate(changeFn) {
  if (_writing) throw new Error('BUSY');
  _writing = true;
  try {
    const fresh = await apiRead();          // step 1: read freshest data
    // Ensure all required dates exist in JSONBin before applying the change
    const { slots: withDates, added } = addMissingDates(expireFillingSlots(fresh.slots || []));
    const freshWithDates = { ...fresh, slots: withDates };
    const updated = changeFn(freshWithDates); // step 2: apply change (may throw)
    await apiWrite(updated);                  // step 3: write back
    return updated;
  } finally {
    _writing = false;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// APPLICATION STATE
// ═══════════════════════════════════════════════════════════════════════════════
const S = {
  view: 'loading',      // loading | landing | candidate | pin | iv-select | iv-panel | form | success
  slots: [],
  avail: {},
  cancelLog: [],
  ivId: null,
  activeDay: null,
  activeSlotId: null,
  successSlot: null,
  cancelTargetId: null,
  pinError: false,
};

// ═══════════════════════════════════════════════════════════════════════════════
// BOOT — read only, NEVER writes
// ═══════════════════════════════════════════════════════════════════════════════
let _pollTimer = null;

async function boot() {
  render(); // show loading screen
  let data = null;
  try {
    data = await apiReadWithRetry(4);
  } catch (_) {
    data = loadCache(); // fall back to cache silently
  }
  if (data) {
    const rawSlots = expireFillingSlots(data.slots || []);
    const { slots: withDates, added } = addMissingDates(rawSlots);
    const processed = applyDSM(withDates);
    S.slots    = processed;
    S.avail    = data.avail || {};
    S.cancelLog= data.cancelLog || [];

    // If new dates were added locally, save them to JSONBin immediately
    // so Register works for those new dates (slots need real IDs in JSONBin)
    if (added && !_writing) {
      _writing = true;
      try {
        // Read absolute latest before writing to avoid overwriting bookings
        const fresh = await apiRead();
        const freshRaw = expireFillingSlots(fresh.slots || []);
        const { slots: freshWithDates } = addMissingDates(freshRaw);
        const toWrite = {
          slots: freshWithDates,
          avail: fresh.avail || S.avail,
          cancelLog: fresh.cancelLog || S.cancelLog,
        };
        await apiWrite(toWrite);
        // Update local state with what we just wrote
        S.slots     = applyDSM(freshWithDates);
        S.avail     = toWrite.avail;
        S.cancelLog = toWrite.cancelLog;
      } catch (_) {
        // Write failed — local slots still work for display,
        // but Register will fail for new dates until next successful write
      } finally {
        _writing = false;
      }
    }
  } else {
    // Truly offline and no cache — show empty local schedule, don't write
    S.slots = processSlots([]);
    S.avail = {}; S.cancelLog = [];
    toast('No connection. Tap Refresh when online.', 6000);
  }
  S.activeDay = localDate(0);
  S.view = 'landing';
  render();
  startPoll();
}

// ═══════════════════════════════════════════════════════════════════════════════
// POLL — read only, NEVER writes
// ═══════════════════════════════════════════════════════════════════════════════
function startPoll() {
  clearInterval(_pollTimer);
  _pollTimer = setInterval(async () => {
    if (document.hidden) return;
    if (['loading', 'form', 'pin'].includes(S.view)) return;
    if (_writing) return;
    try {
      const data = await apiRead();
      S.slots    = processSlots(data.slots || []);
      S.avail    = data.avail || {};
      S.cancelLog= data.cancelLog || [];
      render();
    } catch (_) {
      // Silent fail — keep showing existing state from cache
    }
  }, 18000); // every 18 seconds
}

// ═══════════════════════════════════════════════════════════════════════════════
// CANDIDATE ACTIONS
// ═══════════════════════════════════════════════════════════════════════════════

// Step 1: Candidate clicks "Register" on a slot
// Step 1: Candidate clicks "Register" — open form INSTANTLY, no API call
function startRegister(slotId) {
  // Check locally first (fast, no network)
  const localSlot = S.slots.find(s => s.id === slotId);
  if (!localSlot) { toast('Slot not found. Please tap Refresh.'); return; }
  if (localSlot.status === 'dsm')     { toast('This slot is reserved.'); return; }
  if (localSlot.status === 'booked')  { toast('This slot is already booked. Please pick another.'); return; }
  if (localSlot.status === 'filling') { toast('Someone is registering this slot now. Please pick another.'); return; }

  // Open form instantly — actual booking happens on submit
  S.activeSlotId = slotId;
  S.view = 'form';
  render();
}

// Step 2: Candidate cancels out of the form — instant, no API call needed
function cancelForm() {
  S.activeSlotId = null;
  S.view = 'candidate';
  render();
}

// Step 2 (was 3): Candidate submits form — does full atomic check + booking here
async function submitForm() {
  const name  = document.getElementById('f-name')?.value?.trim();
  const email = document.getElementById('f-email')?.value?.trim();
  const dur   = document.getElementById('f-dur')?.value;
  if (!name || !email) { toast('Name and email are required.'); return; }
  if (!dur)            { toast('Please select your interview duration.'); return; }

  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Confirming…'; }

  const formData = {
    name, email,
    phone:      document.getElementById('f-phone')?.value?.trim()    || '',
    position:   document.getElementById('f-position')?.value?.trim() || '',
    experience: document.getElementById('f-exp')?.value?.trim()      || '',
    duration:   dur,
    notes:      document.getElementById('f-notes')?.value?.trim()    || '',
  };

  // Capture local slot for fallback matching
  const localSlot = S.slots.find(s => s.id === S.activeSlotId);
  if (!localSlot) {
    if (btn) { btn.disabled = false; btn.textContent = 'Confirm Registration →'; }
    toast('Slot not found. Please go back and try again.');
    return;
  }

  try {
    const result = await atomicUpdate(fresh => {
      const slots = expireFillingSlots(fresh.slots || []);

      // Find slot by ID, fallback to ivId+date+time match
      let slot = slots.find(s => s.id === S.activeSlotId);
      if (!slot) {
        slot = slots.find(s =>
          s.ivId === localSlot.ivId &&
          s.date === localSlot.date &&
          s.time === localSlot.time &&
          (s.status === 'available' || s.status === 'filling')
        );
      }

      if (!slot)                    throw new Error('NOTFOUND');
      if (slot.status === 'booked') throw new Error('TAKEN');  // someone booked it while form was open

      // Book the slot
      return {
        slots: slots.map(s => s.id === slot.id
          ? { ...s, status:'booked', ...formData,
              filledAt: new Date().toISOString(), fillingAt:null, sid:null }
          : s),
        avail: fresh.avail || {},
        cancelLog: fresh.cancelLog || [],
      };
    });

    S.slots       = processSlots(result.slots);
    S.avail       = result.avail;
    S.cancelLog   = result.cancelLog;
    // Find success slot (check both processed and raw result)
    S.successSlot = S.slots.find(s =>
        s.ivId === localSlot.ivId &&
        s.date === localSlot.date &&
        s.time === localSlot.time
      ) || { ...localSlot, ...formData, status:'booked' };
    S.activeSlotId = null;
    S.view = 'success';
    render();
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Confirm Registration →'; }
    if (e.message === 'TAKEN')    toast('Sorry, this slot was just booked by someone else. Please go back and pick another slot.');
    else if (e.message === 'BUSY') toast('Please wait a moment and try again.');
    else toast('Error: ' + e.message);
  }
}

async function confirmCancel() {
  if (_cancelBusy) return;
  const slotId = S.cancelTargetId;
  if (!slotId) { closeModal(); return; }
  _cancelBusy = true;
  const btn = document.getElementById('confirm-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>Cancelling…'; }
  const adminName = ivById(S.ivId)?.full || 'Admin';
  try {
    const result = await atomicUpdate(fresh => {
      const slot = (fresh.slots || []).find(s => s.id === slotId);
      if (!slot || slot.status !== 'booked') throw new Error('NOTBOOKED');
      const logEntry = {
        id: uid(), slotId: slot.id, ivId: slot.ivId,
        date: slot.date, time: slot.time,
        name: slot.name, email: slot.email,
        phone: slot.phone || '', position: slot.position || '',
        duration: slot.duration || '',
        cancelledAt: new Date().toISOString(), cancelledBy: adminName,
      };
      return {
        slots: (fresh.slots || []).map(s => s.id === slotId
          ? { ...s, status:'available', name:null, email:null, phone:null,
              position:null, experience:null, duration:null, notes:null,
              filledAt:null, fillingAt:null, sid:null }
          : s),
        avail: fresh.avail || {},
        cancelLog: [...(fresh.cancelLog || []), logEntry],
      };
    });
    S.slots     = processSlots(result.slots);
    S.avail     = result.avail;
    S.cancelLog = result.cancelLog;
    closeModal();
    toast('✅ Interview cancelled. Slot is free for others to book.');
    render();
  } catch (e) {
    _cancelBusy = false;
    if (btn) { btn.disabled = false; btn.innerHTML = 'Yes, Cancel &amp; Free Slot'; }
    if (e.message === 'NOTBOOKED') toast('This slot is not currently booked.');
    else toast('Save failed. Please try again.');
  }
}

// Export all data as a downloadable JSON backup file
async function exportBackup() {
  try {
    let data;
    try { data = await apiReadWithRetry(); }
    catch (_) { data = loadCache(); }
    if (!data) { toast('No data to backup.'); return; }

    const booked = (data.slots || []).filter(s => s.status === 'booked');
    const backup = {
      exportedAt: new Date().toISOString(),
      totalBooked: booked.length,
      slots: data.slots || [],
      avail: data.avail || {},
      cancelLog: data.cancelLog || [],
    };

    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href     = url;
    a.download = `interview-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`✅ Backup downloaded! ${booked.length} bookings saved.`);
  } catch (e) {
    toast('Backup failed. Please try again.');
  }
}

// Export all bookings as CSV for spreadsheet use
async function exportCSV() {
  try {
    let data;
    try { data = await apiReadWithRetry(); }
    catch (_) { data = loadCache(); }
    if (!data) { toast('No data to export.'); return; }

    const booked = (data.slots || []).filter(s => s.status === 'booked');
    if (booked.length === 0) { toast('No bookings to export.'); return; }

    const rows = [
      ['Name','Email','Phone','Position','Experience','Duration','Notes','Interviewer','Date','Day','Time','Booked At']
    ];
    booked.sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time))
      .forEach(s => {
        const iv = ivById(s.ivId);
        rows.push([
          s.name || '', s.email || '', s.phone || '',
          s.position || '', s.experience || '',
          s.duration || '30 min', s.notes || '',
          iv.full, s.date, dayName(s.date), fmtTime(s.time),
          s.filledAt ? fmtAt(s.filledAt) : ''
        ]);
      });

    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href     = url;
    a.download = `interview-bookings-${date}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast(`✅ CSV exported! ${booked.length} bookings.`);
  } catch (e) {
    toast('Export failed. Please try again.');
  }
}

// Restore from a backup JSON file
function restoreBackup() {
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept= '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const backup = JSON.parse(text);
      if (!backup.slots || !Array.isArray(backup.slots)) {
        toast('❌ Invalid backup file.'); return;
      }
      const booked = backup.slots.filter(s => s.status === 'booked').length;
      if (!confirm(`Restore backup from ${backup.exportedAt ? new Date(backup.exportedAt).toLocaleString() : 'unknown date'}?\n\nThis will restore ${booked} bookings and OVERWRITE current data.`)) return;

      await atomicUpdate(() => ({
        slots: backup.slots,
        avail: backup.avail || {},
        cancelLog: backup.cancelLog || [],
      }));
      S.slots     = processSlots(backup.slots);
      S.avail     = backup.avail || {};
      S.cancelLog = backup.cancelLog || [];
      toast(`✅ Restored! ${booked} bookings recovered.`);
      render();
    } catch (e) {
      toast('❌ Restore failed. Invalid or corrupted backup file.');
    }
  };
  input.click();
}

let _toastTimer;
function toast(msg, dur = 3500) {
  const el = document.getElementById('toast-el');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('on'), dur);
}

        </div>`;
      else if (isF) cell = `<span class="badge bg-a">⏳ Being registered… (2 min)</span>`;
      else if (isD) cell = `<span class="mono" style="font-size:12px;color:#999;
        background:#f0ece4;padding:3px 10px;border-radius:6px">🔒 DSM</span>`;
      else cell = `<span class="mono" style="font-size:12px;color:${dayAvl?'#ddd':'#eee'}">
        ${dayAvl ? 'Free' : '— Unavailable'}</span>`;

      return `<div class="tl-row" style="background:${isB?'#fafff8':''}">
        <div class="tl-time" style="color:${isB?iv.color:isD?'#bbb':'#ccc'}">${fmtTime(slot.time)}</div>
        <div class="tl-cell">${cell}</div>
      </div>`;
    }).join('');

    const detailRows = dayBooked.sort((a,b)=>a.time.localeCompare(b.time)).map(s => `<tr>
      <td class="mono" style="color:${iv.color};font-weight:700;white-space:nowrap">${fmtTime(s.time)}</td>
      <td><strong>${esc(s.name)}</strong></td>
      <td class="mono" style="font-size:11px;color:#c8944a">⏱ ${esc(s.duration||'30 min')}</td>
      <td style="color:#555">${esc(s.position||'—')}</td>
      <td class="mono" style="font-size:11px;color:#888">${esc(s.experience||'—')}</td>
      <td class="mono" style="font-size:11px;color:#aaa">
        ${esc(s.email)}<br>${esc(s.phone||'')}</td>
      <td style="font-size:12px;color:#888;font-style:italic">${esc(s.notes||'—')}</td>
      <td style="text-align:center">
        <button class="cancel-btn" onclick="openCancelModal('${s.id}')">✕ Cancel</button></td>
    </tr>`).join('');

    const cancelRows = dayCancelLog.map(l => `<tr style="background:#fff8f8">
      <td class="mono" style="color:#f0b0b0;font-weight:600">${fmtTime(l.time)}</td>
      <td style="color:#aaa">${esc(l.name)}</td>
      <td class="mono" style="font-size:11px;color:#ccc">${esc(l.email)}</td>
      <td class="mono" style="font-size:11px;color:#c0392b">${fmtAt(l.cancelledAt)}</td>
      <td class="mono" style="font-size:11px;color:#aaa">by ${esc(l.cancelledBy)}</td>
      <td><span class="badge bg-g" style="font-size:9px">Slot freed ✓</span></td>
    </tr>`).join('');

    app.innerHTML = `<div class="view">
      ${hdr('Admin — ' + iv.full, 'goLanding()')}
      <!-- Profile -->
      <div style="background:#fff;border:1px solid #e8e2d8;border-radius:13px;padding:16px 20px;
        display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap">
        <div style="width:50px;height:50px;border-radius:50%;background:${iv.color};
          display:flex;align-items:center;justify-content:center;color:#fff;
          font-family:'DM Mono',monospace;font-size:15px;font-weight:500;flex-shrink:0">
          ${iv.ini}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:16px">${iv.full}</div>
          <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">
            <span class="badge bg-a" style="font-size:9px">🔐 Admin</span>
            <span class="badge bg-g" style="font-size:9px">Cancel = slot freed instantly</span>
          </div>
        </div>
        <div style="display:flex;gap:9px;flex-wrap:wrap">
          ${[['Today',todayB,iv.color],['Booked',totalBooked,'#6ec89a'],['Cancelled',totalCancelled,'#e53e3e']].map(([l,v,c])=>`
            <div class="stat-box">
              <div class="stat-num" style="color:${c}">${v}</div>
              <div class="stat-lbl">${l}</div>
            </div>`).join('')}
        </div>
      </div>
      <!-- Day tabs -->
      <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px">
        ${dayTabs}
      </div>
      <!-- Day header -->
      <div style="display:flex;align-items:center;justify-content:space-between;
        margin-bottom:13px;flex-wrap:wrap;gap:9px">
        <div>
          <div style="font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700">
            ${dayName(activeDate)}
            ${activeDate===todayStr?`<span class="badge bg-a" style="font-size:9px;vertical-align:middle;margin-left:5px">Today</span>`:''}
          </div>
          <div class="mono" style="font-size:11px;color:#aaa;margin-top:2px">${fmtDate(activeDate)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:9px;flex-wrap:wrap">
          ${dayBooked.length > 0 ? `<span class="badge bg-g">${dayBooked.length} booked</span>` : ''}
          ${dayCancelLog.length > 0 ? `<span class="badge bg-r">${dayCancelLog.length} cancelled</span>` : ''}
          <span class="badge ${dayAvl?'bg-g':'bg-r'}">${dayAvl?'✓ Available':'✗ Unavailable'}</span>
          <div style="display:flex;align-items:center;gap:7px">
            <span class="mono" style="font-size:11px;color:#aaa">
              ${dayAvl?'Mark unavailable':'Mark available'}</span>
            <label class="tog">
              <input type="checkbox" ${dayAvl?'checked':''} 
                onchange="toggleAvail('${iv.id}','${activeDate}',this.checked)"/>
              <span class="sli"></span>
            </label>
          </div>
        </div>
      </div>
      <!-- Timeline -->
      <div class="card" style="margin-bottom:4px">
        <div style="padding:9px 14px;background:#faf8f4;border-bottom:1px solid #ede8e0;
          display:flex;align-items:center;justify-content:space-between">
          <span class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;
            letter-spacing:.12em">Timeline · 9:00 AM – 8:00 PM · 30-min slots</span>
          <span class="mono" style="font-size:10px;color:#aaa">
            ${daySlots.filter(s=>s.status==='available').length} free</span>
        </div>
        ${tlRows}
      </div>
      ${dayBooked.length > 0 ? `
        <div style="margin-top:20px">
          <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;
            letter-spacing:.13em;margin-bottom:11px">
            📋 Booked — ${dayName(activeDate)} (${dayBooked.length})
          </div>
          <div class="card" style="overflow-x:auto">
            <table><thead><tr>
              <th>Time</th><th>Candidate</th><th>Duration</th><th>Position</th>
              <th>Experience</th><th>Contact</th><th>Notes</th><th>Action</th>
            </tr></thead>
            <tbody>${detailRows}</tbody></table>
          </div>
        </div>` : ''}
      ${dayCancelLog.length > 0 ? `
        <div style="margin-top:18px">
          <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;
            letter-spacing:.13em;margin-bottom:11px">
            ✗ Cancelled — ${dayName(activeDate)} (${dayCancelLog.length}) · Slots freed
          </div>
          <div class="card" style="overflow-x:auto">
            <table><thead><tr>
              <th>Time</th><th>Candidate</th><th>Email</th>
              <th>Cancelled At</th><th>By</th><th>Status</th>
            </tr></thead>
            <tbody>${cancelRows}</tbody></table>
          </div>
        </div>` : ''}
      <div style="margin-top:20px;display:flex;gap:7px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-ghost" onclick="S.view='iv-select';render()"
          style="font-size:12px">← Switch</button>
        <button class="btn btn-ghost" onclick="goLanding()" style="font-size:12px">🏠 Home</button>
        <div style="flex:1"></div>
        <button class="btn btn-ghost" onclick="exportCSV()"
          style="font-size:12px;color:#1a4a90;border-color:#90b8f0">📊 Export CSV</button>
        <button class="btn btn-ghost" onclick="exportBackup()"
          style="font-size:12px;color:#1e6e44;border-color:#b0dfc0">💾 Backup</button>
        <button class="btn btn-ghost" onclick="restoreBackup()"
          style="font-size:12px;color:#8a5a10;border-color:#e8c878">📂 Restore</button>
      </div>
    </div>`;
    return;
  }

  // ── CANDIDATE BOARD ───────────────────────────────────────────────────────
  if (view === 'candidate') {
    const ivSummary = IVS.map(iv => {
      const avl    = getAvail(iv.id, todayStr);
      const booked = visibleSlots.filter(s=>s.ivId===iv.id&&s.status==='booked').length;
      const open   = visibleSlots.filter(s=>s.ivId===iv.id&&s.status==='available').length;
      return `<div style="background:#fff;border:1.5px solid #e8e2d8;border-radius:12px;
        padding:13px 16px;display:flex;align-items:center;gap:12px">
        <div style="width:40px;height:40px;border-radius:50%;background:${iv.color};
          display:flex;align-items:center;justify-content:center;color:#fff;
          font-family:'DM Mono',monospace;font-size:13px;flex-shrink:0">${iv.ini}</div>
        <div>
          <div style="font-weight:600;font-size:14px">${iv.full}</div>
          <div style="margin-top:4px;display:flex;gap:5px;flex-wrap:wrap">
            <span class="badge ${avl?'bg-g':'bg-r'}" style="font-size:9px">
              ${avl?'✓ Available today':'✗ Unavailable today'}</span>
            <span class="badge bg-b" style="font-size:9px">${booked} booked</span>
            <span class="badge bg-a" style="font-size:9px">${open} open</span>
          </div>
        </div>
      </div>`;
    }).join('');

    const sections = dates.map(date => {
      const kkSlots = visibleSlots.filter(s=>s.ivId==='kk'&&s.date===date).sort((a,b)=>a.time.localeCompare(b.time));
      const rrSlots = visibleSlots.filter(s=>s.ivId==='rr'&&s.date===date).sort((a,b)=>a.time.localeCompare(b.time));
      const kkAvl   = getAvail('kk', date);
      const rrAvl   = getAvail('rr', date);
      const bookedCount = [...kkSlots,...rrSlots].filter(s=>s.status==='booked').length;
      const allTimes = [...new Set([...kkSlots,...rrSlots].map(s=>s.time))].sort();

      const slotCell = (slot, iv, ivAvl) => {
        if (!slot) return `<td style="padding:8px 11px;border-left:1px solid #f0ece4;color:#eee;font-size:11px">—</td>`;
        const isB = slot.status === 'booked';
        const isF = slot.status === 'filling';
        const isD = slot.status === 'dsm';
        const na  = slot.status === 'available' && !ivAvl;
        const canR= slot.status === 'available' && ivAvl;
        return `<td style="padding:8px 11px;border-left:1px solid #f0ece4;
          background:${isB?'#f4fbf7':isF?'#fffbf0':'#fff'}">
          ${isD ? `<span class="mono" style="font-size:11px;color:#aaa;
              background:#f0ece4;padding:3px 8px;border-radius:5px">DSM</span>`
            : isB ? `<span style="font-weight:600;font-size:12px;color:#1e6e44">${esc(slot.name)}</span>
              <div class="mono" style="font-size:10px;color:#aaa;margin-top:2px">
                Duration: ${esc(slot.duration||'30 min')} (${fmtTime(slot.time)} – ${fmtEndTime(slot.time)})</div>
              <div class="mono" style="font-size:10px;color:#6ec89a;margin-top:1px">✓ Booked</div>`
            : isF ? `<span class="badge bg-a" style="font-size:9px">⏳ Being registered…</span>`
            : na  ? `<span class="mono" style="font-size:11px;color:#ddd">Unavailable</span>`
            : `<button onclick="startRegister('${slot.id}')"
                style="padding:6px 11px;background:${iv.color};color:#fff;border:none;
                border-radius:7px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
                cursor:pointer;transition:all .15s">Register →</button>`}
        </td>`;
      };

      return `<div style="margin-bottom:26px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap">
          <span style="font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700">
            ${dayName(date)}</span>
          ${date===todayStr?`<span class="badge bg-a" style="font-size:9px">Today</span>`:''}
          <span class="mono" style="font-size:11px;color:#aaa">${fmtDate(date)}</span>
          ${bookedCount>0?`<span class="badge bg-b" style="font-size:9px">${bookedCount} booked</span>`:''}
          ${!(kkAvl||rrAvl)?`<span class="badge bg-r" style="font-size:9px">Both unavailable</span>`:''}
          <div style="flex:1;height:1px;background:#e8e2d8;min-width:16px"></div>
        </div>
        <div class="card">
          <table><thead><tr>
            <th style="width:86px">Time</th>
            <th><span style="display:inline-flex;align-items:center;gap:5px">
              <span style="width:8px;height:8px;border-radius:50%;background:#c8944a;display:inline-block"></span>
              Kondareddy ${!kkAvl?`<span class="badge bg-r" style="font-size:8px;margin-left:3px">Unavailable</span>`:''}</span></th>
            <th><span style="display:inline-flex;align-items:center;gap:5px">
              <span style="width:8px;height:8px;border-radius:50%;background:#4a90c8;display:inline-block"></span>
              Ramireddy ${!rrAvl?`<span class="badge bg-r" style="font-size:8px;margin-left:3px">Unavailable</span>`:''}</span></th>
          </tr></thead>
          <tbody>${allTimes.map(time => `<tr>
            <td class="mono" style="padding:8px 11px;font-size:12px;color:#999;
              white-space:nowrap;background:#faf8f4">${fmtTime(time)}</td>
            ${slotCell(kkSlots.find(s=>s.time===time), IVS[0], kkAvl)}
            ${slotCell(rrSlots.find(s=>s.time===time), IVS[1], rrAvl)}
          </tr>`).join('')}</tbody></table>
        </div>
      </div>`;
    }).join('');

    app.innerHTML = `<div class="view">
      ${hdr('Candidate portal · 30-min slots · 9 AM – 8 PM', 'goLanding()')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:22px">
        ${ivSummary}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;
        margin-bottom:16px;flex-wrap:wrap;gap:7px">
        <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;
          letter-spacing:.13em">📅 Interview Slots</div>
        <button class="btn btn-ghost" onclick="refreshData()"
          style="font-size:11px;padding:6px 12px">↻ Refresh</button>
      </div>
      ${sections}
      ${bookedAll.length > 0 ? `
        <div style="margin-top:8px">
          <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;
            letter-spacing:.13em;margin-bottom:11px">
            ✅ All Registered Candidates (${bookedAll.length})
          </div>
          <div class="card" style="overflow-x:auto"><table>
            <thead><tr>
              <th>Candidate</th><th>Interviewer</th><th>Day</th>
              <th>Date</th><th>Time</th><th>Duration</th><th>Position</th>
            </tr></thead>
            <tbody>${bookedAll.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time))
              .map((s, idx) => {
                const iv = ivById(s.ivId);
                return `<tr style="background:${idx%2?'#fdfcf8':'#fff'}">
                  <td><strong>${esc(s.name)}</strong>
                    <div class="mono" style="font-size:11px;color:#aaa">${esc(s.email)}</div></td>
                  <td><span style="display:inline-flex;align-items:center;gap:5px">
                    <span style="width:8px;height:8px;border-radius:50%;background:${iv.color};display:inline-block"></span>
                    ${iv.name}</span></td>
                  <td class="mono" style="font-size:12px;color:#888">${dayName(s.date)}</td>
                  <td class="mono" style="font-size:12px;color:#888">${fmtDate(s.date)}</td>
                  <td class="mono" style="color:${iv.color};font-weight:600">${fmtTime(s.time)}</td>
                  <td class="mono" style="font-size:12px;color:#888">${esc(s.duration||'30 min')}</td>
                  <td style="color:#666">${esc(s.position||'—')}</td>
                </tr>`;
              }).join('')}
            </tbody></table></div>
        </div>` : ''}
    </div>`;
    return;
  }

  // ── REGISTRATION FORM ─────────────────────────────────────────────────────
  if (view === 'form') {
    const slot = slots.find(s => s.id === S.activeSlotId) ||
                 S.slots.find(s => s.id === S.activeSlotId);
    const iv   = slot ? ivById(slot.ivId) : IVS[0];
    app.innerHTML = `<div class="view">
      ${hdr('Register for interview', 'cancelForm()')}
      <div style="max-width:520px;margin:0 auto">
        <!-- Slot info -->
        <div style="background:#fff;border:2px solid ${iv.color}40;border-radius:12px;
          padding:16px 20px;margin-bottom:20px">
          <span class="lbl" style="color:${iv.color}">Your Confirmed Slot</span>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:3px">
            <div>
              <span class="lbl">Interviewer</span>
              <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
                <span style="width:8px;height:8px;border-radius:50%;background:${iv.color};display:inline-block"></span>
                <span style="font-weight:600;font-size:13px">${iv.name}</span>
              </div>
            </div>
            <div>
              <span class="lbl">Date</span>
              <div style="font-weight:500;font-size:13px;margin-top:2px">
                ${slot ? dayName(slot.date)+', '+fmtDate(slot.date) : '—'}</div>
            </div>
            <div>
              <span class="lbl">Time</span>
              <div style="font-weight:700;font-size:14px;color:${iv.color};margin-top:2px">
                ${slot ? fmtTime(slot.time) : '—'}</div>
            </div>
          </div>
        </div>
        <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;
          letter-spacing:.13em;margin-bottom:13px">Your Details</div>
        <div class="fg" style="margin-bottom:12px">
          <div class="s2">
            <span class="lbl">Full Name *</span>
            <input id="f-name" placeholder="Your full name"/>
          </div>
          <div>
            <span class="lbl">Email *</span>
            <input id="f-email" type="email" placeholder="you@email.com"/>
          </div>
          <div>
            <span class="lbl">Phone</span>
            <input id="f-phone" type="tel" placeholder="+91 98765 43210"/>
          </div>
          <div>
            <span class="lbl">Position Applied</span>
            <input id="f-position" placeholder="e.g. Software Engineer"/>
          </div>
          <div>
            <span class="lbl">Years of Experience</span>
            <input id="f-exp" placeholder="e.g. 4 years"/>
          </div>
          <div>
            <span class="lbl">Interview Duration *</span>
            <select id="f-dur">
              <option value="">Select duration</option>
              <option value="30 min">30 min</option>
              <option value="1 hr">1 hr</option>
              <option value="1.5 hrs">1.5 hrs</option>
              <option value="2 hrs">2 hrs</option>
            </select>
          </div>
          <div class="s2">
            <span class="lbl">Notes for Interviewer</span>
            <textarea id="f-notes" placeholder="Anything you'd like the interviewer to know…"></textarea>
          </div>
        </div>
        <div style="display:flex;gap:9px">
          <button class="btn btn-ghost" onclick="cancelForm()">Cancel</button>
          <button class="btn btn-amber" id="submit-btn" onclick="submitForm()" style="flex:1">
            Confirm Registration →
          </button>
        </div>
        <p class="mono" style="text-align:center;font-size:10px;color:#ccc;margin-top:8px">
          * Required · Slot held for 2 minutes
        </p>
      </div>
    </div>`;
    return;
  }

  // ── SUCCESS ───────────────────────────────────────────────────────────────
  if (view === 'success') {
    const s  = S.successSlot;
    const iv = s ? ivById(s.ivId) : IVS[0];
    app.innerHTML = `<div class="view" style="text-align:center;padding:36px 20px;
      max-width:440px;margin:0 auto">
      ${hdr('Registration confirmed', 'goLanding()')}
      <div style="font-size:54px;margin:6px 0 12px">🎉</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#1a1a2e;margin-bottom:7px">
        All set, ${esc(s?.name?.split(' ')[0])}!
      </h2>
      <p style="color:#888;font-size:14px;margin-bottom:20px;line-height:1.7">
        Your interview is confirmed. Be ready at the time below.
      </p>
      <div style="background:#fff;border:2px solid ${iv.color}38;border-radius:12px;
        padding:18px 24px;margin-bottom:20px;text-align:left">
        ${[
          ['Interviewer', iv.full],
          ['Day',  s ? dayName(s.date) : ''],
          ['Date', s ? fmtDate(s.date) : ''],
          ['Time', s ? fmtTime(s.time) : ''],
          ['Duration', s?.duration || '30 min'],
          ['Position', s?.position || '—'],
        ].map(([l,v]) => `
          <div style="display:flex;justify-content:space-between;align-items:center;
            padding:7px 0;border-bottom:1px solid #f0ece4">
            <span class="lbl">${l}</span>
            <span style="font-size:14px;font-weight:600;color:#1a1a2e">${esc(v)}</span>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="S.view='candidate';S.successSlot=null;render()">
          ← View Schedule</button>
        <button class="btn btn-dark" onclick="goLanding()">🏠 Home</button>
      </div>
    </div>`;
  }
}

boot();
</script>
</body>
</html>
