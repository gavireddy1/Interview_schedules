<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Interview Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:#f4f3ef;color:#1a1a2e;min-height:100vh}
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 5% 0%,rgba(200,148,74,0.1) 0%,transparent 55%),
             radial-gradient(ellipse 50% 40% at 95% 100%,rgba(106,180,232,0.08) 0%,transparent 55%)}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:28px 18px 80px}
input,select,textarea{width:100%;background:#fff;border:1.5px solid #e0dbd0;border-radius:9px;
  padding:10px 13px;font-family:'Outfit',sans-serif;font-size:14px;color:#1a1a2e;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#c8944a;box-shadow:0 0 0 3px rgba(200,148,74,.1)}
textarea{resize:vertical;min-height:68px}
.btn{padding:10px 20px;border:none;border-radius:9px;font-family:'Outfit',sans-serif;
  font-weight:600;font-size:13px;cursor:pointer;transition:all .18s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-dark{background:#1a1a2e;color:#fff}.btn-dark:hover:not(:disabled){background:#282840}
.btn-amber{background:#c8944a;color:#fff}.btn-amber:hover:not(:disabled){background:#b07a38}
.btn-red{background:#e53e3e;color:#fff}.btn-red:hover:not(:disabled){background:#c53030}
.btn-ghost{background:#fff;border:1.5px solid #ddd;color:#666}.btn-ghost:hover:not(:disabled){border-color:#999;color:#333}
.btn-ghost-red{background:#fff;border:1.5px solid #f5c0c0;color:#c0392b}.btn-ghost-red:hover:not(:disabled){background:#fff5f5}
.mono{font-family:'DM Mono',monospace}
.lbl{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.13em;display:block;margin-bottom:4px}
.card{background:#fff;border:1px solid #e8e2d8;border-radius:14px;overflow:hidden}
.view{animation:fi .22s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
table{width:100%;border-collapse:collapse}
th{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.1em;
   padding:11px 15px;text-align:left;font-weight:500;background:#faf8f4;white-space:nowrap}
td{padding:10px 15px;font-size:13px;border-top:1px solid #ede8e0;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.04em;white-space:nowrap}
.bg-g{background:#edf7f2;color:#1e6e44;border:1px solid #b0dfc0}
.bg-r{background:#fef0f0;color:#b02020;border:1px solid #f0b0b0}
.bg-a{background:#fef8ed;color:#8a5a10;border:1px solid #e8c878}
.bg-b{background:#eef5ff;color:#1a4a90;border:1px solid #90b8f0}
.bg-m{background:#f5f0ff;color:#5a1a90;border:1px solid #c090f0}
.bg-cancelled{background:#fff0f0;color:#c0392b;border:1px solid #f5c0c0}
.toast{position:fixed;bottom:24px;right:20px;background:#1a1a2e;color:#fff;border-radius:11px;
  padding:12px 18px;font-size:13px;box-shadow:0 6px 28px rgba(0,0,0,.18);z-index:9999;
  max-width:320px;line-height:1.5;opacity:0;transform:translateY(10px);transition:all .28s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.s2{grid-column:1/-1}
@media(max-width:560px){.fg{grid-template-columns:1fr}.s2{grid-column:1}}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.sli{position:absolute;inset:0;background:#ddd;border-radius:24px;cursor:pointer;transition:.25s}
.sli:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
input:checked+.sli{background:#6ec89a}
input:checked+.sli:before{transform:translateX(20px)}
.tl-row{display:grid;grid-template-columns:90px 1fr;border-bottom:1px solid #f0ece4}
.tl-row:last-child{border-bottom:none}
.tl-time{padding:12px 14px;font-family:'DM Mono',monospace;font-size:12px;
  border-right:1px solid #f0ece4;background:#faf8f4;display:flex;align-items:center;color:#bbb}
.tl-cell{padding:10px 14px;display:flex;align-items:center}
.dtab{padding:7px 14px;border:1.5px solid #e0dbd0;border-radius:8px;background:#fff;
  font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center}
.dtab:hover{border-color:#c8944a;color:#c8944a}
.dtab.act{background:#c8944a;border-color:#c8944a;color:#fff}
.stat-box{background:#fff;border:1px solid #e8e2d8;border-radius:12px;padding:14px 16px;text-align:center;min-width:80px}
.stat-num{font-family:'Playfair Display',serif;font-size:1.8rem;line-height:1}
.stat-lbl{font-family:'DM Mono',monospace;font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
.lcard{background:#fff;border:2px solid #e8e2d8;border-radius:16px;padding:28px 24px;
  cursor:pointer;text-align:left;transition:all .18s;width:100%}
.lcard:hover{border-color:#c8944a;transform:translateY(-2px);box-shadow:0 8px 28px rgba(200,148,74,.12)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;
  align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:28px;max-width:420px;width:100%;
  box-shadow:0 16px 60px rgba(0,0,0,.25);animation:fi .2s ease}
.cancel-btn{padding:5px 10px;border:1.5px solid #f5c0c0;border-radius:7px;background:#fff;
  color:#c0392b;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.cancel-btn:hover{background:#fff0f0;border-color:#e53e3e}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.35);
  border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:#edf7f2;border:1px solid #b0dfc0;
  border-radius:20px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:11px;color:#1e6e44}
/* PIN screen */
.pin-box{background:#fff;border:1.5px solid #e0dbd0;border-radius:18px;padding:36px 32px;max-width:360px;margin:60px auto 0;text-align:center}
.pin-input{text-align:center;font-size:28px;letter-spacing:.4em;font-family:'DM Mono',monospace;font-weight:600}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<!-- Cancel Modal -->
<div class="modal-bg" id="cancel-modal" style="display:none">
  <div class="modal">
    <div style="font-size:32px;text-align:center;margin-bottom:12px">⚠️</div>
    <h3 style="font-family:'Playfair Display',serif;font-size:1.3rem;text-align:center;margin-bottom:8px">Cancel Interview?</h3>
    <p style="font-size:13px;color:#888;text-align:center;line-height:1.6;margin-bottom:8px">You are about to cancel the interview for:</p>
    <div id="modal-info" style="background:#fff5f5;border:1px solid #f5c0c0;border-radius:10px;padding:14px 18px;margin-bottom:20px;text-align:center"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Keep It</button>
      <button class="btn btn-red" style="flex:1" id="confirm-cancel-btn" onclick="confirmCancel()">Yes, Cancel Interview</button>
    </div>
  </div>
</div>

<script>
// ─── HARDCODED CREDENTIALS — no setup screen for anyone ──────────────────────
const CFG = {
  key:   "$2a$10$BTD2e43NYyQThu0hJfJUbOj2X3Xz/n50FarlnMOAdE4c9CnrXCHuW",
  binId: "69c7c7b0ed015c742bc4ac17"
};
const ADMIN_PIN = "1234"; // Kondareddy & Ramireddy use this PIN to log in as admin

const IVS = [
  {id:"kk", name:"Kondareddy", full:"Gavireddy Kondareddy", ini:"GK", color:"#c8944a"},
  {id:"rr", name:"Ramireddy",  full:"Ramireddy",            ini:"RR", color:"#4a90c8"},
];
const MAX_FILL = 2;
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const SID  = Math.random().toString(36).slice(2,10);
const JB   = "https://api.jsonbin.io/v3";

function makeTimes(){ const t=[]; for(let h=9;h<20;h++){t.push(`${h}:00`);t.push(`${h}:30`);} return t; }
const TIMES = makeTimes();

function uid()  { return Math.random().toString(36).slice(2,10) }
function tod(n=0){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10) }
function dayName(ds){ const[y,m,d]=ds.split("-").map(Number); return DAYS[new Date(y,m-1,d).getDay()] }
function fmtDate(ds){ const[y,m,d]=ds.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) }
function fmtTime(t){ const[h,m]=t.split(":").map(Number); return `${h>12?h-12:h||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}` }
function fmtAt(iso){ return iso?new Date(iso).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"—" }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") }
function iv(id){ return IVS.find(i=>i.id===id)||IVS[0] }

function freshSlots(){
  const sl=[];
  for(let d=0;d<7;d++){
    const date=tod(d);
    IVS.forEach(i=>TIMES.forEach(time=>sl.push({
      id:uid(),ivId:i.id,date,time,
      status:"available",
      name:null,email:null,phone:null,position:null,experience:null,notes:null,
      filledAt:null,cancelledAt:null,cancelledBy:null,fillingAt:null,sid:null
    })));
  }
  return sl;
}

function expireStale(slots){
  const now=Date.now();
  return slots.map(s=>{
    if(s.status==="filling"&&s.fillingAt&&now-new Date(s.fillingAt).getTime()>8*60000)
      return{...s,status:"available",fillingAt:null,sid:null};
    return s;
  });
}

// ─── JSONBIN ──────────────────────────────────────────────────────────────────
async function jRead(){
  const r=await fetch(`${JB}/b/${CFG.binId}/latest`,{headers:{"X-Master-Key":CFG.key,"X-Bin-Meta":"false"}});
  if(!r.ok) throw new Error(`Read failed (${r.status})`);
  return await r.json();
}
async function jWrite(data){
  const r=await fetch(`${JB}/b/${CFG.binId}`,{method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":CFG.key},
    body:JSON.stringify(data)});
  if(!r.ok) throw new Error(`Write failed`);
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let S={
  view:"loading",       // loading|landing|candidate|pin|iv-select|iv-panel|form|success
  slots:[], avail:{},
  ivId:null,
  activeDay:null,
  activeSlotId:null,
  successSlot:null,
  cancelTargetId:null,
  pinError:false,
};

let pollTimer=null;

async function boot(){
  render();
  try{
    const data=await jRead();
    S.slots=expireStale(data.slots||freshSlots());
    S.avail=data.avail||{};
    // First time — create fresh slots if bin is empty
    if(!data.slots){ await jWrite({slots:S.slots,avail:{}}); }
  }catch(e){
    S.slots=freshSlots(); S.avail={};
  }
  S.activeDay=tod(0);
  S.view="landing";
  render();
  startPoll();
}

function startPoll(){
  clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(["loading","form","pin"].includes(S.view)) return;
    try{
      const data=await jRead();
      S.slots=expireStale(data.slots||[]);
      S.avail=data.avail||{};
      render();
    }catch{}
  },6000);
}

// ─── CANDIDATE ACTIONS ────────────────────────────────────────────────────────
async function goRegister(slotId){
  let data; try{ data=await jRead(); }catch{ toast("⚠️ Network error. Try again."); return; }
  let slots=expireStale(data.slots||[]);
  const af=slots.filter(s=>s.status==="filling").length;
  const slot=slots.find(s=>s.id===slotId);
  if(!slot||slot.status!=="available"){ toast("❌ Slot just taken. Pick another."); S.slots=slots; render(); return; }
  if(af>=MAX_FILL){ toast(`⏳ ${MAX_FILL} people filling form now. Please wait a moment.`,5000); S.slots=slots; render(); return; }
  const upd=slots.map(s=>s.id===slotId?{...s,status:"filling",fillingAt:new Date().toISOString(),sid:SID}:s);
  try{ await jWrite({slots:upd,avail:S.avail}); }catch{ toast("⚠️ Network error. Try again."); return; }
  S.slots=upd; S.activeSlotId=slotId; S.view="form"; render();
}

async function cancelForm(){
  if(S.activeSlotId){
    try{
      const data=await jRead();
      const upd=(data.slots||[]).map(s=>s.id===S.activeSlotId&&s.sid===SID?{...s,status:"available",fillingAt:null,sid:null}:s);
      await jWrite({slots:upd,avail:S.avail}); S.slots=upd;
    }catch{}
  }
  S.activeSlotId=null; S.view="candidate"; render();
}

async function submitForm(){
  const name=document.getElementById("fn")?.value?.trim();
  const email=document.getElementById("fe")?.value?.trim();
  if(!name||!email){ toast("Name and email are required."); return; }
  const btn=document.getElementById("sbtn");
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Confirming…';}
  const fd={name,email,
    phone:document.getElementById("fp")?.value?.trim()||"",
    position:document.getElementById("fpo")?.value?.trim()||"",
    experience:document.getElementById("fex")?.value?.trim()||"",
    notes:document.getElementById("fnt")?.value?.trim()||""};
  let data; try{ data=await jRead(); }catch{ toast("⚠️ Network error. Try again."); if(btn){btn.disabled=false;btn.textContent="Confirm Registration →";} return; }
  const upd=(data.slots||[]).map(s=>s.id===S.activeSlotId?{...s,status:"booked",...fd,filledAt:new Date().toISOString(),sid:null}:s);
  try{ await jWrite({slots:upd,avail:S.avail}); }catch{ toast("⚠️ Save failed. Try again."); if(btn){btn.disabled=false;btn.textContent="Confirm Registration →";} return; }
  S.slots=upd; S.successSlot=upd.find(s=>s.id===S.activeSlotId);
  S.activeSlotId=null; S.view="success"; render();
}

// ─── ADMIN PIN ────────────────────────────────────────────────────────────────
function checkPin(){
  const pin=document.getElementById("pin-input")?.value?.trim();
  if(pin===ADMIN_PIN){ S.pinError=false; S.view="iv-select"; render(); }
  else{ S.pinError=true; render(); }
}

// ─── ADMIN ACTIONS ────────────────────────────────────────────────────────────
function toggleAvail(ivId,date,val){
  if(!S.avail[ivId]) S.avail[ivId]={};
  S.avail[ivId][date]=val;
  jWrite({slots:S.slots,avail:S.avail}).catch(()=>toast("⚠️ Network error saving availability."));
  render();
}
function getAvail(ivId,date){
  if(!S.avail[ivId]) return true;
  return S.avail[ivId][date]!==undefined?S.avail[ivId][date]:true;
}

function openCancelModal(slotId){
  S.cancelTargetId=slotId;
  const slot=S.slots.find(s=>s.id===slotId);
  if(!slot) return;
  document.getElementById("modal-info").innerHTML=`
    <div style="font-weight:700;font-size:15px;color:#1a1a2e;margin-bottom:4px">${esc(slot.name)}</div>
    <div style="font-family:'DM Mono',monospace;font-size:12px;color:#888;margin-bottom:6px">${esc(slot.email)}</div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <span style="font-family:'DM Mono',monospace;font-size:12px;color:#c8944a">${dayName(slot.date)}, ${fmtDate(slot.date)}</span>
      <span style="font-family:'DM Mono',monospace;font-size:13px;color:#4a90c8;font-weight:700">${fmtTime(slot.time)}</span>
    </div>`;
  document.getElementById("cancel-modal").style.display="flex";
}
function closeModal(){ document.getElementById("cancel-modal").style.display="none"; S.cancelTargetId=null; }

async function confirmCancel(){
  if(!S.cancelTargetId){ closeModal(); return; }
  const btn=document.getElementById("confirm-cancel-btn");
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>Cancelling…';}
  const adminName=iv(S.ivId)?.full||"Admin";
  let data; try{ data=await jRead(); }catch{ toast("⚠️ Network error."); closeModal(); return; }
  const upd=(data.slots||[]).map(s=>s.id===S.cancelTargetId
    ?{...s,status:"cancelled",cancelledAt:new Date().toISOString(),cancelledBy:adminName,sid:null}:s);
  try{ await jWrite({slots:upd,avail:S.avail}); }catch{ toast("⚠️ Save failed."); closeModal(); return; }
  S.slots=upd; closeModal();
  toast("✅ Interview cancelled. Slot is now free.");
  render();
}

async function restoreSlot(slotId){
  let data; try{ data=await jRead(); }catch{ toast("⚠️ Network error."); return; }
  const upd=(data.slots||[]).map(s=>s.id===slotId
    ?{...s,status:"available",name:null,email:null,phone:null,position:null,experience:null,
        notes:null,filledAt:null,cancelledAt:null,cancelledBy:null}:s);
  try{ await jWrite({slots:upd,avail:S.avail}); }catch{ toast("⚠️ Save failed."); return; }
  S.slots=upd; toast("✅ Slot restored."); render();
}

async function resetAll(){
  if(!confirm("Reset ALL slots and registrations? Cannot be undone.")) return;
  const fresh={slots:freshSlots(),avail:{}};
  try{ await jWrite(fresh); S.slots=fresh.slots; S.avail=fresh.avail; toast("✅ Schedule reset."); render(); }
  catch{ toast("⚠️ Network error."); }
}

window.addEventListener("beforeunload",()=>{
  if(!S.activeSlotId) return;
  try{
    const upd=S.slots.map(s=>s.id===S.activeSlotId&&s.sid===SID?{...s,status:"available",fillingAt:null,sid:null}:s);
    navigator.sendBeacon&&navigator.sendBeacon(`${JB}/b/${CFG.binId}`,new Blob([JSON.stringify({slots:upd,avail:S.avail})],{type:"application/json"}));
  }catch{}
});

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  const{view,slots,avail}=S;
  const af=slots.filter(s=>s.status==="filling").length;
  const bookedAll=slots.filter(s=>s.status==="booked");
  const cancelledAll=slots.filter(s=>s.status==="cancelled");
  const dates=[...new Set(slots.map(s=>s.date))].sort();

  const hdr=(sub,back)=>`
    <div style="margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #e0dbd0;
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.3rem);
          color:#1a1a2e;letter-spacing:-.02em;line-height:1">
          Interview <em style="font-style:italic;color:#c8944a">Scheduler</em>
        </h1>
        <p class="mono" style="font-size:10px;color:#aaa;letter-spacing:.13em;text-transform:uppercase;margin-top:5px">${sub}</p>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <span class="live-pill">🟢 Live</span>
        ${back?`<button class="btn btn-ghost" onclick="${back}" style="font-size:12px;padding:8px 14px">🏠 Home</button>`:""}
      </div>
    </div>`;

  // ── LOADING ──────────────────────────────────────────────────────────────
  if(view==="loading"){
    app.innerHTML=`<div style="text-align:center;padding:100px 20px">
      <div style="font-size:36px;margin-bottom:16px">📅</div>
      <h1 style="font-family:'Playfair Display',serif;font-size:2rem;color:#1a1a2e;margin-bottom:8px">
        Interview <em style="color:#c8944a;font-style:italic">Scheduler</em>
      </h1>
      <div class="mono" style="font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:.12em;margin-top:16px">
        <span class="spin" style="border-color:rgba(0,0,0,.15);border-top-color:#c8944a"></span>
        Connecting…
      </div>
    </div>`;
    return;
  }

  // ── LANDING ───────────────────────────────────────────────────────────────
  if(view==="landing"){
    const todayStr=tod(0);
    const todayBooked=bookedAll.filter(s=>s.date===todayStr);
    app.innerHTML=`<div class="view">
      ${hdr("Select your role")}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:680px;margin:0 auto 36px">
        <button class="lcard" onclick="S.view='candidate';render()">
          <div style="font-size:36px;margin-bottom:12px">🎯</div>
          <div style="font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:6px">I'm a Candidate</div>
          <div style="font-size:13px;color:#888;line-height:1.6">Browse 30-min slots 9 AM–8 PM, see who's registered, and book your interview.</div>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
            <span class="badge bg-g">✓ ${slots.filter(s=>s.status==="available").length} open</span>
            <span class="badge bg-b">${bookedAll.length} booked</span>
            ${cancelledAll.length>0?`<span class="badge bg-cancelled">${cancelledAll.length} cancelled</span>`:""}
          </div>
        </button>

            <span style="width:6px;height:6px;border-radius:50%;background:${af>0?"#e8c878":"#6ec89a"};display:inline-block"></span>
            ${af}/${MAX_FILL} filling now</span>
          <button class="btn btn-ghost" onclick="loadData()" style="font-size:11px;padding:6px 12px">↻ Refresh</button>
        </div>
      </div>
      ${sections}
      ${bookedAll.length>0||cancelledAll.length>0?`
        <div style="margin-top:8px">
          <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.13em;margin-bottom:12px">
            ✅ All Registrations (${bookedAll.length} booked${cancelledAll.length>0?`, ${cancelledAll.length} cancelled`:""})
          </div>
          <div class="card"><table>
            <thead><tr><th>Candidate</th><th>Interviewer</th><th>Day</th><th>Date</th><th>Time</th><th>Position</th><th>Status</th></tr></thead>
            <tbody>${[...bookedAll,...cancelledAll].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).map((s,idx)=>{
              const i=iv(s.ivId); const isC=s.status==="cancelled";
              return`<tr style="background:${isC?"#fff8f8":idx%2?"#fdfcf8":"#fff"}">
                <td><span style="${isC?"text-decoration:line-through;color:#aaa":""}">${esc(s.name)}</span>
                  <div class="mono" style="font-size:11px;color:#aaa">${esc(s.email)}</div></td>
                <td><span style="display:inline-flex;align-items:center;gap:6px">
                  <span style="width:8px;height:8px;border-radius:50%;background:${i.color};display:inline-block"></span>${i.name}</span></td>
                <td class="mono" style="font-size:12px;color:#888">${dayName(s.date)}</td>
                <td class="mono" style="font-size:12px;color:#888">${fmtDate(s.date)}</td>
                <td class="mono" style="color:${isC?"#f0b0b0":i.color};font-weight:600${isC?";text-decoration:line-through":""}">${fmtTime(s.time)}</td>
                <td style="color:#666">${esc(s.position||"—")}</td>
                <td>${isC?`<span class="badge bg-cancelled">✗ Cancelled</span>`:`<span class="badge bg-g">✓ Booked</span>`}</td>
              </tr>`;}).join("")}
            </tbody></table></div>
        </div>`:""}
    </div>`;
    return;
  }

  // ── FORM ─────────────────────────────────────────────────────────────────
  if(view==="form"){
    const slot=slots.find(s=>s.id===S.activeSlotId);
    const i=slot?iv(slot.ivId):IVS[0];
    app.innerHTML=`<div class="view">
      ${hdr("Register for interview","cancelForm()")}
      <div style="max-width:540px;margin:0 auto">
        <div style="background:#fff;border:2px solid ${i.color}38;border-radius:13px;padding:18px 22px;margin-bottom:22px">
          <span class="lbl" style="color:${i.color}">Your Confirmed Slot</span>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px">
            <div><span class="lbl">Interviewer</span>
              <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
                <span style="width:8px;height:8px;border-radius:50%;background:${i.color};display:inline-block"></span>
                <span style="font-weight:600;font-size:13px">${i.name}</span>
              </div></div>
            <div><span class="lbl">Date</span>
              <div style="font-weight:500;font-size:13px;margin-top:2px">${slot?dayName(slot.date)+", "+fmtDate(slot.date):"—"}</div></div>
            <div><span class="lbl">Time</span>
              <div style="font-weight:700;font-size:15px;color:${i.color};margin-top:2px">${slot?fmtTime(slot.time):"—"}</div></div>
          </div>
        </div>
        <div class="mono" style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.13em;margin-bottom:14px">Your Details</div>
        <div class="fg" style="margin-bottom:14px">
          <div class="s2"><span class="lbl">Full Name *</span><input id="fn" placeholder="Your full name"/></div>
          <div><span class="lbl">Email *</span><input id="fe" type="email" placeholder="you@email.com"/></div>
          <div><span class="lbl">Phone</span><input id="fp" type="tel" placeholder="+91 98765 43210"/></div>
          <div><span class="lbl">Position Applied</span><input id="fpo" placeholder="e.g. Software Engineer"/></div>
          <div><span class="lbl">Years of Experience</span><input id="fex" placeholder="e.g. 4 years"/></div>
          <div class="s2"><span class="lbl">Notes for Interviewer</span>
            <textarea id="fnt" placeholder="Anything you'd like the interviewer to know…"></textarea></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" onclick="cancelForm()">Cancel</button>
          <button class="btn btn-amber" id="sbtn" onclick="submitForm()" style="flex:1">Confirm Registration →</button>
        </div>
        <p class="mono" style="text-align:center;font-size:10px;color:#ccc;margin-top:9px">* Required · Slot held for 8 minutes</p>
      </div>
    </div>`;
    return;
  }

  // ── SUCCESS ───────────────────────────────────────────────────────────────
  if(view==="success"){
    const s=S.successSlot; const i=s?iv(s.ivId):IVS[0];
    app.innerHTML=`<div class="view" style="text-align:center;padding:40px 20px;max-width:460px;margin:0 auto">
      ${hdr("Registration confirmed","goLanding()")}
      <div style="font-size:56px;margin:8px 0 14px">🎉</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:1.9rem;color:#1a1a2e;margin-bottom:8px">
        All set, ${esc(s?.name?.split(" ")[0])}!
      </h2>
      <p style="color:#888;font-size:14px;margin-bottom:22px;line-height:1.7">
        Your interview is confirmed. Please be ready at the time below.
      </p>
      <div style="background:#fff;border:2px solid ${i.color}38;border-radius:13px;padding:20px 26px;margin-bottom:22px;text-align:left">
        ${[["Interviewer",i.full],["Day",s?dayName(s.date):""],["Date",s?fmtDate(s.date):""],["Time",s?fmtTime(s.time):""],["Position",s?.position||"—"]].map(([l,v])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0ece4">
            <span class="lbl">${l}</span>
            <span style="font-size:14px;font-weight:600;color:#1a1a2e">${esc(v)}</span>
          </div>`).join("")}
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="S.view='candidate';S.successSlot=null;render()">← View Schedule</button>
        <button class="btn btn-dark" onclick="goLanding()">🏠 Home</button>
      </div>
    </div>`;
  }
}

function goLanding(){ S.view="landing"; S.activeSlotId=null; render(); }
function setDay(d){ S.activeDay=d; render(); }

async function loadData(){
  try{
    const data=await jRead();
    S.slots=expireStale(data.slots||[]);
    S.avail=data.avail||{};
    render(); toast("✅ Refreshed.");
  }catch{ toast("⚠️ Network error."); }
}

let toastT;
function toast(msg,d=3500){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("on");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),d);
}

boot();
</script>
</body>
</html>
